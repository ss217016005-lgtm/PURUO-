<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת קבצים</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; margin: 0; padding: 20px; color: #1f2937; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2563eb; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: space-between; align-items: center; background: #eff6ff; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
        select, input[type="file"], button { padding: 10px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        .file-list { list-style: none; padding: 0; }
        .file-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #e5e7eb; align-items: center; }
        .btn-download { background: #10b981; padding: 8px 15px; text-decoration: none; color: white; border-radius: 5px; font-size: 14px; display: inline-block; }
        .btn-download:hover { background: #059669; }
        #status { text-align: center; color: #dc2626; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול קבצים (מאובטח)</h1>
    
    <div class="controls">
        <div>
            <label for="category">בחר תיקייה: </label>
            <select id="category" onchange="loadFiles()">
                <option value="documents">מסמכים</option>
                <option value="images">תמונות</option>
                <option value="transcripts">תמלולים</option>
                <option value="others">אחר</option>
            </select>
        </div>
        <div>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">העלה קובץ</button>
        </div>
    </div>

    <div id="status"></div>
    <ul class="file-list" id="fileList"></ul>
</div>

<script>
    async function loadFiles() {
        const category = document.getElementById("category").value;
        const listEl = document.getElementById("fileList");
        listEl.innerHTML = "טוען...";
        
        try {
            // האתר פונה ל-Node.js שלו עצמו, והוא כבר יפנה ל-VPS בשושו
            const response = await fetch(`/api/cloud/list/${category}`);
            const data = await response.json();
            
            listEl.innerHTML = "";
            if (!data.files || data.files.length === 0) {
                listEl.innerHTML = "<li>אין קבצים בתיקייה זו.</li>";
                return;
            }

            data.files.forEach(file => {
                const li = document.createElement("li");
                li.className = "file-item";
                li.innerHTML = `
                    <span>📄 ${file}</span>
                    <a href="/api/cloud/download/${category}/${file}" class="btn-download">הורדה למחשב</a>
                `;
                listEl.appendChild(li);
            });
        } catch (error) {
            document.getElementById("status").innerText = "❌ שגיאה בטעינה";
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const category = document.getElementById("category").value;
        const status = document.getElementById("status");
        
        if (fileInput.files.length === 0) {
            status.innerText = "⚠️ אנא בחר קובץ";
            return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        status.style.color = "#2563eb";
        status.innerText = "⏳ שולח לשרת המרכזי (מעביר ל-VPS)...";

        try {
            const response = await fetch(`/api/cloud/upload/${category}`, {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("העלאה נכשלה");
            
            status.style.color = "#10b981";
            status.innerText = "✅ נשמר בהצלחה!";
            fileInput.value = "";
            loadFiles();
        } catch (error) {
            status.style.color = "#dc2626";
            status.innerText = "❌ שגיאה: " + error.message;
        }
    }

    loadFiles();
</script>

</body>
</html>
