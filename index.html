<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פורום פרומרקייט</title>
    <style>
        :root{--primary:#4F46E5;--secondary:#EC4899;--bg:#F3F4F6;--box-bg:#FFFFFF;--text:#1F2937;--border:#E5E7EB}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);margin:0;color:var(--text)}
        .header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;padding:25px;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
        .header h1{margin:0;font-size:32px;font-weight:800;text-shadow:1px 1px 2px rgba(0,0,0,0.2)}
        .layout{display:flex;max-width:1200px;margin:20px auto;gap:20px;padding:0 15px}
        .main-content{flex:3;background:var(--box-bg);padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05)}
        .sidebar{flex:1;background:var(--box-bg);padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05);height:fit-content}
        .hidden{display:none !important}
        input[type="text"],input[type="password"],textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;transition:0.3s}
        button{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.2s}
        button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 6px rgba(79,70,229,0.3)}
        button:disabled{opacity:0.6;cursor:not-allowed}
        .btn-action{background:#f3f4f6;color:#4b5563;border:1px solid #d1d5db;font-size:13px;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-block;margin-left:5px}
        .btn-action.liked{background:#fbcfe8;color:#be185d;border-color:#f9a8d4}
        .thread-card{border:1px solid var(--border);padding:15px;border-radius:10px;margin-bottom:15px;background:#ffffff;cursor:pointer;transition:0.2s;display:flex;flex-direction:column}
        .thread-card:hover{transform:translateX(-3px);box-shadow:0 4px 10px rgba(0,0,0,0.05)}
        .thread-title{font-size:20px;font-weight:bold;color:var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .cat-tag{padding:3px 8px;border-radius:6px;color:white;font-size:12px;font-weight:bold}
        .post-container{display:flex;background:#f9fafb;border:1px solid var(--border);border-radius:10px;margin-bottom:15px;overflow:hidden; scroll-margin-top: 20px;}
        .user-panel{background:#f3f4f6;padding:15px;width:160px;text-align:center;border-left:1px solid var(--border)}
        .content-panel{padding:15px;flex:1;display:flex;flex-direction:column; position: relative;}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:bold;margin-bottom:5px;color:white}
        .badge-admin{background:#EF4444} .badge-mod{background:#F59E0B} .badge-editor{background:#0d9488} .badge-top{background:#fbbf24;color:black} .badge-vet{background:#8B5CF6} .badge-user{background:#6B7280}
        .quote-box{background:#e0f2fe;border-right:4px solid #0284c7;padding:12px;margin:10px 0;border-radius:8px 0 0 8px;color:#0c4a6e;font-style:italic;position:relative}
        .quote-box::before{content:"❝";font-size:24px;position:absolute;left:10px;top:5px;color:#7dd3fc;opacity:0.5}
        .spoiler{border:1px solid #ccc;border-radius:5px;background:#fff;margin:10px 0;overflow:hidden}
        .spoiler summary{background:#e5e7eb;padding:10px;cursor:pointer;font-weight:bold;color:#374151}
        .spoiler-content{padding:15px;border-top:1px solid #ccc;background:#f9fafb}
        .tagged-user{color:#4F46E5;font-weight:bold;background:#e0e7ff;padding:0 4px;border-radius:4px;cursor:pointer}
        .unread-badge{color:red;font-size:12px;font-weight:bold;background:#fee2e2;padding:2px 6px;border-radius:4px}
        .clickable-user{cursor:pointer;color:var(--primary);text-decoration:underline;text-decoration-color:transparent;transition:0.2s}
        .clickable-user:hover{text-decoration-color:var(--primary)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px)}
        .modal-box{background:white;padding:25px;border-radius:12px;text-align:center;max-width:600px;width:90%;box-shadow:0 10px 25px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto; transition: 0.3s;}
        .modal-box-large { max-width: 1000px !important; width: 95%; height: 85vh; display:flex; flex-direction:column; }
        .icon-btn{cursor:pointer;font-size:20px;position:relative;margin-left:15px;background:none;border:none;padding:0;color:#1F2937}
        .icon-btn .notif-count{position:absolute;top:-8px;right:-10px;background:#EF4444;color:white;font-size:11px;padding:2px 6px;border-radius:50%;font-weight:bold}
        .chat-bubble{padding:10px;border-radius:12px;margin-bottom:10px;max-width:85%;clear:both;position:relative}
        .pm-thanks{font-size:10px;background:#fbcfe8;color:#be185d;padding:2px 5px;border-radius:10px;position:absolute;bottom:-8px;left:10px;border:1px solid white;cursor:pointer}
        #toastContainer{position:fixed;bottom:20px;left:20px;z-index:10000;display:flex;flex-direction:column;gap:10px}
        .toast{background:var(--primary);color:white;padding:15px 20px;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.3);animation:slideIn 0.3s ease-out;cursor:pointer}
        @keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .rich-toolbar{display:flex;gap:5px;background:#e5e7eb;padding:5px;border-radius:5px 5px 0 0;border:1px solid var(--border);border-bottom:none; flex-wrap:wrap;}
        .rich-toolbar button{background:white;color:black;padding:5px 10px;font-size:12px;border:1px solid #ccc;border-radius:4px;cursor:pointer}
        .rich-toolbar button:hover{background:#f3f4f6}
        .search-bar{display:flex;gap:10px;background:#f9fafb;padding:15px;border-radius:8px;margin-bottom:20px;border:1px solid var(--border); flex-wrap:wrap;}
        .rules-box {background:#e0e7ff; padding:15px; border-radius:8px; border:1px solid #c7d2fe; margin-top:15px; text-align:right;}
        .split-cb { position: absolute; left: 15px; top: 15px; transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body>

    <div id="toastContainer"></div>
    <div id="sysModal" class="modal-overlay hidden"><div class="modal-box" id="sysModalBox"><h2 id="sysModalTitle" style="margin-top:0; color: var(--primary);">הודעה</h2><div id="sysModalText" style="font-size:16px; margin-bottom: 25px; text-align:right;"></div><div id="sysModalBtns"></div></div></div>

    <div class="header"><h1>✨ פורום פרומרקייט ✨</h1></div>

    <div id="authSection" style="max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color: var(--primary);">התחברות לפורום</h2>
        <input type="text" id="username" placeholder="שם משתמש">
        <input type="password" id="password" placeholder="סיסמה">
        <label style="display: block; margin: 10px 0; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="rememberMe" style="width: auto;"> תזכור אותי
        </label>
        
        <div class="rules-box">
            <label style="font-size: 14px; cursor: pointer; display:flex; align-items:center; gap:8px; font-weight:bold; color:#3730a3;">
                <input type="checkbox" id="agreeRules" style="width: 18px; height: 18px;"> 
                <span>אני מאשר/ת שקראתי והבנתי את <a href="#" onclick="showRules(); return false;" style="color:var(--primary); text-decoration:underline;">כללי הפורום</a>.</span>
            </label>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="loginBtn" onclick="login()" style="flex: 1;">התחבר</button>
            <button id="regBtn" onclick="register()" style="flex: 1; background: var(--secondary);">הרשמה כמשתמש חדש</button>
        </div>
    </div>

    <div id="forumSection" class="layout hidden">
        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <h2 id="welcomeMsg" style="margin: 0; color: var(--primary);"></h2>
                    <button class="icon-btn" onclick="showNotifications()" title="התראות">🔔 <span id="notifBadge" class="notif-count hidden">0</span></button>
                    <button class="icon-btn" onclick="openInbox()" title="הודעות פרטיות">✉️ <span id="msgBadge" class="notif-count hidden">0</span></button>
                </div>
                <div><button id="adminBtn" class="hidden" onclick="window.location.href='/admin.html'" style="background: #10B981; margin-left: 10px;">ניהול</button><button onclick="logout()" style="background: #EF4444;">התנתק</button></div>
            </div>

            <div class="search-bar" id="searchContainer">
                <input type="text" id="searchInput" placeholder="חפש בפורום..." style="flex:2; margin:0;">
                <select id="searchType" style="flex:1; margin:0;"><option value="all">חיפוש כללי</option><option value="user">חיפוש לפי כותב</option><option value="category">חיפוש בקטגוריה נוכחית</option></select>
                <button onclick="executeSearch()" style="background:var(--primary);">🔍 חפש</button>
                <button onclick="clearSearch()" style="background:#6B7280;">✖️ נקה</button>
            </div>

            <div id="userProfileView" class="hidden">
                <button onclick="closeProfileAndReturn()" style="background: #6B7280; margin-bottom: 20px;">➔ חזור</button>
                <div id="profileContentArea" style="background: #f9fafb; padding: 20px; border-radius: 10px; border: 1px solid var(--border);"></div>
            </div>

            <div id="allFilesView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--primary); margin:0;">📁 כל הקבצים בפורום</h2>
                    <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לפורום</button>
                </div>
                <div id="allFilesContainer" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;"></div>
            </div>

            <div id="linkArchiveView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--primary); margin:0;">🗃️ מאגר קישורים</h2>
                    <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לפורום</button>
                </div>
                <div style="background:#fdf2f8; padding:15px; border-radius:8px; border:1px solid #fbcfe8; margin-bottom:20px;">
                    <h4 style="margin-top:0;">הוסף קישור חדש למאגר:</h4>
                    <input type="text" id="newLinkTitle" placeholder="כותרת / תיאור הקישור (למשל: אתר למאגר תמונות חינמי)">
                    <input type="text" id="newLinkUrl" placeholder="כתובת הקישור (כולל https://)">
                    <button onclick="addLinkToArchive()" style="margin-top:10px;">💾 שמור במאגר</button>
                </div>
                <div id="linksContainer" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </div>

            <div id="threadsView">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap:wrap;">
                    <select id="categorySelect" onchange="renderThreads()" style="flex: 2; margin: 0; font-weight: bold; min-width:200px;"></select>
                    <button onclick="renderCategoryView()" style="background:#f59e0b; padding: 10px 15px;">🗂️ תצוגה לפי נושאים</button>
                    <button onclick="markAllAsRead()" style="background:#6B7280; padding: 10px 15px;">✔️ סמן הכל כנקרא</button>
                    <button onclick="toggleNewThreadForm()" style="flex: 1; background: var(--secondary); min-width:150px;">+ פתח אשכול</button>
                </div>

                <div id="newThreadForm" class="hidden" style="background: #fdf2f8; border: 1px solid #fbcfe8; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <input type="text" id="newThreadTitle" placeholder="כותרת האשכול">
                    <div class="rich-toolbar">
                        <button type="button" onclick="insertTag('newThreadContent', '[b]', '[/b]')"><b>B</b></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[i]', '[/i]')"><i>I</i></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[u]', '[/u]')"><u>U</u></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[color=red]', '[/color]')"><span style="color:red">A</span></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[size=20]', '[/size]')">T</button>
                        <button type="button" onclick="insertTag('newThreadContent', '[spoiler]', '[/spoiler]')">👁️</button>
                        <button type="button" onclick="promptForLink('newThreadContent')">🔗 קישור</button>
                    </div>
                    <textarea id="newThreadContent" rows="4" placeholder="תוכן ההודעה..." style="border-top:none; border-radius:0 0 8px 8px; margin-top:0;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <input type="file" id="newThreadFile" multiple style="width: auto; background: white; border: 1px solid #ccc; border-radius: 4px; padding: 5px;">
                        <button id="postThreadBtn" onclick="createThread()">פרסם אשכול</button>
                    </div>
                </div>
                <div id="threadsList"></div>
            </div>

            <div id="singleThreadView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לרשימת הנושאים</button>
                        <button id="splitModeBtn" class="hidden" onclick="toggleSplitMode()" style="background: #0ea5e9;">✂️ מצב פיצול אשכול</button>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="threadSearchInput" placeholder="חפש באשכול..." style="margin:0; padding:8px; width:200px;">
                        <button onclick="searchInThread()">🔍 חפש</button>
                    </div>
                </div>
                <div id="splitActionArea" class="hidden" style="background:#e0f2fe; padding:15px; border-radius:8px; border:1px solid #bae6fd; margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <strong style="color:#0284c7;">פיצול מסומנים לאשכול חדש:</strong>
                    <input type="text" id="splitNewTitle" placeholder="כותרת האשכול החדש" style="margin:0; flex:1;">
                    <button onclick="executeSplit()" style="background:#0284c7;">בצע פיצול</button>
                </div>
                <div id="threadContentArea"></div>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">סטטוס הקהילה</h3>
            <button onclick="showMembersList()" style="width:100%; background:#3b82f6; margin-bottom:10px;">👥 חברי הקהילה (<span id="totalUsersCounter">0</span>)</button>
            <button onclick="openLinkArchive()" style="width:100%; background:#0ea5e9; margin-bottom:10px;">🗃️ מאגר קישורים</button>
            <button onclick="openAllFiles()" style="width:100%; background:#8b5cf6; margin-bottom:15px;">📁 כל הקבצים בפורום</button>
            <button onclick="showRules()" style="width:100%; background:#10b981; margin-bottom:15px;">📜 חוקי הפורום</button>
            <p style="font-weight: bold; margin-bottom: 5px;">🟢 מחוברים כעת (<span id="onlineCount">0</span>):</p>
            <ul id="onlineUsersList" style="list-style: none; padding: 0; margin: 0; font-size: 14px;"></ul>
            <button onclick="triggerContactUs()" style="width:100%; background:#d946ef; margin-top:20px;">📞 צור קשר עם ההנהלה</button>
        </div>
    </div>

    <script>
        let currentUser = null, currentUserRole = null, postsData = [], usersInfo = {}, confirmActionCb = null;
        let readThreads = JSON.parse(localStorage.getItem('readThreads')) || {};
        window.currentConvos = {}; let currentChatPartner = null; let currentChatSubject = null;
        let lastUnreadCount = 0, lastUnreadMsgs = 0;
        let isSubmitting = false;
        let isSplitMode = false;

        const catColors = { "תמונות והסרטות": "#3b82f6", "עזרה הדדית": "#10b981", "בית המדרש": "#8b5cf6", "הלכה למעשה": "#d946ef", "כתבי רבותינו": "#f59e0b", "קורות דורות": "#06b6d4", "אקטואליה": "#ef4444", "הפורום שלנו": "#f97316", "חדשות בציבור": "#64748b" };
        function getCatColor(cat) { return catColors[cat] || "#6B7280"; }
        function timeAgo(ms) { if (!ms) return 'לא ידוע'; const s = Math.floor((Date.now()-ms)/1000); if (s<60) return 'מחובר כעת 🟢'; const m = Math.floor(s/60); if (m<60) return `לפני ${m} דקות`; const h = Math.floor(m/60); if (h<24) return `לפני ${h} שעות`; return `לפני ${Math.floor(h/24)} ימים`; }
        
        function showMsg(t, txt, hm=true) { 
            document.getElementById('sysModalBox').className = 'modal-box'; 
            document.getElementById('sysModalTitle').innerText = t; 
            document.getElementById('sysModalText').innerHTML = hm ? txt : `<div style="white-space:pre-wrap;">${txt}</div>`; 
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal()">סגור</button>`; 
            document.getElementById('sysModal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('sysModal').classList.add('hidden'); document.getElementById('sysModalBox').className = 'modal-box'; }
        function showInputMsg(txt, cbName) { document.getElementById('sysModalTitle').innerText='הזנה'; document.getElementById('sysModalText').innerHTML=`${txt}<br><br><input type="text" id="modalInput" style="width:100%;">`; document.getElementById('sysModalBtns').innerHTML=`<button onclick="closeModal(); window['${cbName}'](document.getElementById('modalInput').value);" style="background:#10B981; margin-left:10px;">שמור</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden'); setTimeout(()=>document.getElementById('modalInput').focus(),100); }
        function showConfirm(txt, cb) { confirmActionCb = cb; document.getElementById('sysModalTitle').innerText='אישור'; document.getElementById('sysModalText').innerText=txt; document.getElementById('sysModalBtns').innerHTML=`<button onclick="closeModal(); confirmActionCb();" style="background:#EF4444; margin-left:10px;">כן</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden'); }

        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); } catch(e) {} }
        function triggerPopupAlert(msg) { playBeep(); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; toast.onclick = () => toast.remove(); document.getElementById('toastContainer').appendChild(toast); setTimeout(() => toast.remove(), 4000); if ("Notification" in window && Notification.permission === "granted") new Notification("פורום פרומרקייט", { body: msg }); }

        window.insertTag = function(id, oTag, cTag) { const el=document.getElementById(id); const s=el.selectionStart, e=el.selectionEnd, txt=el.value; el.value = txt.substring(0,s)+oTag+txt.substring(s,e)+cTag+txt.substring(e,txt.length); el.focus(); el.selectionStart=s+oTag.length; el.selectionEnd=e+oTag.length; };
        
        window.promptForLink = function(textareaId) {
            const url = prompt("הדבק את הקישור כאן (כולל https://):");
            if (url) {
                const text = prompt("איזו מילה תרצה שתופיע כקישור? (השאר ריק כדי להציג את הכתובת עצמה)");
                const linkText = text ? text : url;
                insertTag(textareaId, `[url=${url}]`, `${linkText}[/url]`);
            }
        };

        window.showRules = async function() {
            try {
                const res = await fetch('/api/settings');
                if(res.ok) {
                    const settings = await res.json();
                    showMsg('כללי הפורום', `<div style="text-align:right; font-size:15px; line-height:1.6; white-space:pre-wrap;">${settings.rules || 'אין חוקים מוגדרים'}</div>`, true);
                } else {
                    showMsg('כללי הפורום', 'לא ניתן לטעון את החוקים כרגע.', true);
                }
            } catch (e) {
                showMsg('שגיאה', 'שגיאת רשת בטעינת הכללים.', true);
            }
        };

        function parseBBCode(txt) { 
            let html = txt.replace(/\[b\]([\s\S]*?)\[\/b\]/gi, '<strong>$1</strong>');
            html = html.replace(/\[i\]([\s\S]*?)\[\/i\]/gi, '<em>$1</em>');
            html = html.replace(/\[u\]([\s\S]*?)\[\/u\]/gi, '<u>$1</u>');
            html = html.replace(/\[color=(.*?)\]([\s\S]*?)\[\/color\]/gi, '<span style="color:$1">$2</span>');
            html = html.replace(/\[size=(.*?)\]([\s\S]*?)\[\/size\]/gi, '<span style="font-size:$1px">$2</span>');
            html = html.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi, '<details class="spoiler"><summary>👁️ ספוילר (לחץ להצגה)</summary><div class="spoiler-content">$1</div></details>');
            html = html.replace(/\[url=(.*?)\]([\s\S]*?)\[\/url\]/gi, '<a href="$1" target="_blank" style="color:var(--primary); text-decoration:underline; font-weight:bold; word-break:break-all;">$2</a>');

            const res = await fetch('/api/ping', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, typingTo: typingTarget, currentActivity: activity}) });
            const data = await res.json(); document.getElementById('onlineCount').innerText = data.onlineUsers.length;

        window.refreshChatBox = function(partner, subject, forceScroll = false) {
            const scroll = document.getElementById('chatScroll');
            if(!scroll) return;
            
            const savedDraft = document.getElementById('pmReplyContent') ? document.getElementById('pmReplyContent').value : ''; 
            let html = '';
            const key = partner + '|||' + subject;
            const chatMsgs = (window.currentConvos[key] || []).sort((a,b) => a.id - b.id);
            
            chatMsgs.forEach(m => {
                const isMe = m.from === currentUser;
                const likesHtml = m.likes.length > 0 ? `<div class="pm-thanks">❤️ ${m.likes.length}</div>` : '';
                const likeBtn = !isMe ? `<button style="background:none; border:none; color:#be185d; cursor:pointer; font-size:12px; margin-top:5px;" onclick="likePM(${m.id})">👍 תודה</button>` : '';
                
                const quoteBtn = `<button style="background:none; border:none; color:#0284c7; cursor:pointer; font-size:12px; margin-top:5px; margin-right:5px;" onclick="quotePM(${m.id})">💬 צטט</button>`;
                const deleteBtn = isMe ? `<button style="background:none; border:none; color:red; cursor:pointer; font-size:12px; margin-top:5px; margin-right:5px;" onclick="deletePM(${m.id})">🗑️ מחק</button>` : '';

                let fHtml = ''; if(m.fileUrls) m.fileUrls.forEach(u => {
                    const ext = u.split('.').pop().toLowerCase();
                    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) { fHtml += `<br><img src="${u}" style="max-width:100%; max-height:150px; border-radius:5px;">`; }
                    else { fHtml += `<br><a href="${u}" target="_blank" style="font-size:11px; background:#eee; padding:2px 5px; border-radius:3px;">📎 קובץ</a>`; }
                });
                
                const cText = parseBBCode(m.content).replace(/\n/g, '<br>');
                html += `<div class="chat-bubble" style="background:${isMe?'#e0e7ff':'#fff'}; border:1px solid ${isMe?'#c7d2fe':'#e5e7eb'}; align-self:${isMe?'flex-end':'flex-start'}; min-width: 200px;">
                            <strong style="font-size:13px; color:gray;">${m.from}</strong><br><span style="font-size:15px;">${cText}</span>${fHtml}
                            <div style="font-size:10px; color:#aaa; margin-top:6px;">${m.date}</div>
                            <div style="display:flex; align-items:center;">${likeBtn} ${quoteBtn} ${deleteBtn}</div>
                            ${likesHtml}
                         </div>`;
            });

            // מונע רינדור מחדש אם ה-HTML זהה (מונע קפיצות מעצבנות)
            if (scroll.innerHTML === html) return;

            // בדיקה אם המשתמש כבר גלל למטה
            const isNearBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 100;
            
            scroll.innerHTML = html; 
            if(document.getElementById('pmReplyContent')) document.getElementById('pmReplyContent').value = savedDraft; 
            
            if (forceScroll || isNearBottom) {
                scroll.scrollTop = scroll.scrollHeight;
            }
        }

        window.quotePM = function(msgId) {
            let targetMsg = null;
            for (let key in window.currentConvos) {
                const found = window.currentConvos[key].find(m => m.id === msgId);
                if (found) targetMsg = found;
            }
            if (!targetMsg) return;
            
            let clean = targetMsg.content;
            // קילוף כל הציטוטים הפנימיים מההודעה כדי לצטט רק את ההודעה עצמה
            while(clean.match(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi)) {
                clean = clean.replace(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi, '');
            }
            clean = clean.trim();

            const textarea = document.getElementById('pmReplyContent');
            textarea.value += `[quote="${targetMsg.from}"]\n${clean}\n[/quote]\n\n`;
            textarea.focus();
        }

        window.deletePM = async function(id) {
            if(confirm("למחוק הודעה פרטית זו?")) {
                await fetch(`/api/messages/${id}`, { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: currentUser}) });
                updatePing(); 
            }
        }

        window.likePM = async function(id) { await fetch(`/api/messages/${id}/like`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username: currentUser}) }); updatePing(); }
        
        window.openNewChat = function(toUser, forceSubject = null) {

                submitNewChat(forceSubject);
            } else {
                showInputMsg(`מה נושא השיחה החדשה עם ${toUser}?`, 'submitNewChat');

        window.submitNewChat = function(subj) {

            openInbox().then(() => { 
                const key = window.submitNewChatUser + '|||' + subj;
                if (window.currentConvos[key]) openChat(window.submitNewChatUser, subj); else { window.currentConvos[key]=[]; openChat(window.submitNewChatUser, subj); }
            });
        }
        
        window.sendPMReply = async function(toUser, subject) {
            if(isSubmitting) return;
            const content = document.getElementById('pmReplyContent').value; const fileInput = document.getElementById('pmReplyFile');
            if(!content) return;
            isSubmitting = true; document.getElementById('pmSendBtn').disabled = true;
            
            const fd = new FormData(); fd.append('from', currentUser); fd.append('to', toUser); fd.append('content', content); fd.append('subject', subject);
            if (fileInput && fileInput.files) { for(let i=0; i<fileInput.files.length; i++) fd.append('attachedFiles', fileInput.files[i]); }
            const res = await fetch('/api/messages', { method: 'POST', body: fd });
            const data = await res.json(); if(data.error) { alert(data.error); isSubmitting = false; document.getElementById('pmSendBtn').disabled = false; return; }
            
            document.getElementById('pmReplyContent').value = '';
            if (fileInput) fileInput.value = '';
            await updatePing(); 
            isSubmitting = false; document.getElementById('pmSendBtn').disabled = false;
        }

            closeModal(); await loadPosts(); await openThread(threadId, true); 
            if(replyId) {

                    const el = document.getElementById('post-' + replyId);
                    if(el) { el.scrollIntoView({behavior: 'smooth', block: 'center'}); el.style.boxShadow = "0 0 15px rgba(79,70,229,0.5)"; setTimeout(() => el.style.boxShadow = "none", 2000); }

        async function showNotifications() {
            await fetch('/api/notifications/mark-read', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });
            document.getElementById('notifBadge').classList.add('hidden'); lastUnreadCount = 0;
            const res = await fetch('/api/ping', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });

        window.clearAllNotifications = async function() { await fetch('/api/notifications/clear', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) }); closeModal(); showMsg('נמחק', 'כל ההתראות נמחקו.'); };

        async function loadPosts() {
            postsData = await (await fetch('/api/posts')).json(); 
            const urlThreadId = parseInt(new URLSearchParams(window.location.search).get('thread'));
            if (urlThreadId && postsData.find(p => p.id === urlThreadId)) openThread(urlThreadId, true);
            else if (!document.getElementById('userProfileView').classList.contains('hidden') || !document.getElementById('linkArchiveView').classList.contains('hidden') || !document.getElementById('allFilesView').classList.contains('hidden') || !document.getElementById('sysModal').classList.contains('hidden')) {} 
            else { const currentOpenId = parseInt(document.getElementById('singleThreadView').getAttribute('data-current-id')); if(currentOpenId) openThread(currentOpenId, true); else renderThreads(); }

        // עריכה של ציטוט בפורום עצמו - מקלף ציטוטים פנימיים
        window.handleQuote = function(postId, replyId) {
            const p = postsData.find(x => x.id === postId);
            const target = replyId ? p.replies.find(r => r.id === replyId) : p;
            if(!target) return;
            
            let clean = target.content;
            while(clean.match(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi)) {
                clean = clean.replace(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi, '');
            }
            clean = clean.replace(/\[נערך לאחרונה.*?\]/g, '').trim();
            
            document.getElementById('replyContent').value += `[quote="${target.author}"]\n${clean}\n[/quote]\n\n`; 
            document.getElementById('replyContent').focus(); 
        };

        function generateThreadCard(p) {
            const isUnread = p.lastUpdated > (readThreads[p.id] || 0);
            const lastMsg = p.replies.length > 0 ? p.replies[p.replies.length - 1] : p;
            
            return `
            <div class="thread-card ${p.isLocked ? 'thread-locked' : ''}" onclick="openThread(${p.id})">
                <div class="thread-title">${p.isLocked ? '🔒 ' : ''}<span class="cat-tag" style="background:${getCatColor(p.category)};">${p.category}</span>${p.title} ${isUnread ? '<span class="unread-badge">חדש</span>' : ''}</div>
                <div style="font-size: 13px; color: #6B7280; display: flex; justify-content: space-between; margin-top:5px; border-top: 1px solid #eee; padding-top: 5px;">
                    <div>
                        <span>מאת: <strong class="clickable-user" onclick="showUserProfile('${p.author}'); event.stopPropagation();">${p.author}</strong></span><br>
                        <span style="font-size:11px;">👁️ ${p.views} צפיות | 💬 ${p.replies.length} תגובות</span>
                    </div>
                    <div style="text-align:left; font-size: 12px; color: #888;">
                        <span>הודעה אחרונה מ: <strong class="clickable-user" onclick="showUserProfile('${lastMsg.author}'); event.stopPropagation();">${lastMsg.author}</strong></span><br>
                        <span>${lastMsg.date}</span>
                    </div>
                </div>
            </div>`;
        }

        function renderThreads() {
            hideAllViews(); document.getElementById('searchContainer').classList.remove('hidden'); document.getElementById('threadsView').classList.remove('hidden');
            const cat = document.getElementById('categorySelect').value; let filtered = postsData;
            const isVet = usersInfo[currentUser] && (usersInfo[currentUser].isVeteran || currentUserRole === 'admin' || currentUserRole === 'mod' || currentUserRole === 'editor');
            if (!isVet) filtered = filtered.filter(p => p.category !== 'אקטואליה');
            if (cat) filtered = filtered.filter(p => p.category === cat);
            document.getElementById('threadsList').innerHTML = filtered.map(generateThreadCard).join('');
        }

        function renderCategoryView() {
            hideAllViews(); document.getElementById('searchContainer').classList.remove('hidden'); document.getElementById('threadsView').classList.remove('hidden');
            let html = ''; const cats = Array.from(document.getElementById('categorySelect').options).map(o => o.value).filter(v => v);
            cats.forEach(c => { const catPosts = postsData.filter(p => p.category === c); if(catPosts.length > 0) { html += `<h3 style="margin-top:20px; border-bottom:2px solid ${getCatColor(c)}; color:${getCatColor(c)}; padding-bottom:5px;">📁 ${c}</h3>` + catPosts.map(generateThreadCard).join(''); }});
            document.getElementById('threadsList').innerHTML = html;
        }

        function toggleNewThreadForm() { document.getElementById('newThreadForm').classList.toggle('hidden'); }

        async function createThread() {
            if(isSubmitting) return;
            const title = document.getElementById('newThreadTitle').value, content = document.getElementById('newThreadContent').value, cat = document.getElementById('categorySelect').value, fileInput = document.getElementById('newThreadFile');
            if (!title || !content || !cat) return showMsg('שגיאה', 'חובה למלא הכל.');
            isSubmitting = true; document.getElementById('postThreadBtn').disabled = true;
            const fd = new FormData(); fd.append('author', currentUser); fd.append('title', title); fd.append('content', content); fd.append('category', cat);

            isSubmitting = false; document.getElementById('postThreadBtn').disabled = false;
        }

        function getUserBadge(username) {
            const info = usersInfo[username] || { role: 'user', joinDate: '', totalLikes: 0, isVeteran: false, lastSeen: Date.now() };
            let roleHtml = info.role === 'admin' ? `<span class="badge badge-admin">👑 מנהל ראשי</span>` : (info.role === 'editor' ? `<span class="badge badge-editor">📝 עורך תוכן</span>` : (info.role === 'mod' ? `<span class="badge badge-mod">🛡️ צוות פיקוח</span>` : (info.totalLikes >= 50 ? `<span class="badge badge-top">🏆 משתמש מוביל</span>` : (info.isVeteran ? `<span class="badge badge-vet">🌟 משתמש ותיק</span>` : `<span class="badge badge-user">משתמש רגיל</span>`))));
            return `${roleHtml}<br><span style="font-size:10px; color:#9CA3AF; display:block; margin-top:3px;">נראה לאחרונה: ${timeAgo(info.lastSeen)}</span><span style="font-size:11px; color:#6B7280; display:block; margin-top:2px;">הצטרף: ${info.joinDate}</span><span style="font-size:11px; color:#EC4899; font-weight:bold; display:block;">❤️ לייקים: ${info.totalLikes}</span>`;

        window.toggleSplitMode = function() {
            isSplitMode = !isSplitMode;
            if(isSplitMode) {
                document.getElementById('splitActionArea').classList.remove('hidden');
                document.querySelectorAll('.split-cb').forEach(el => el.classList.remove('hidden'));
            } else {
                document.getElementById('splitActionArea').classList.add('hidden');
                document.querySelectorAll('.split-cb').forEach(el => el.classList.add('hidden'));

        window.executeSplit = async function() {
            const newTitle = document.getElementById('splitNewTitle').value;
            if (!newTitle) return alert("הכנס כותרת לאשכול החדש.");
            const selectedBoxes = Array.from(document.querySelectorAll('.split-cb:checked')).map(cb => parseInt(cb.value));
            if (selectedBoxes.length === 0) return alert("לא נבחרו תגובות.");
            
            const postId = parseInt(document.getElementById('singleThreadView').getAttribute('data-current-id'));
            const res = await fetch('/api/posts/split', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId: postId, replyIds: selectedBoxes, newTitle}) });
            const data = await res.json();
            if(data.success) { isSplitMode = false; document.getElementById('splitNewTitle').value = ''; await loadPosts(); openThread(data.newPostId, true); }
            else { alert(data.error); }
        };

        function renderPostBlock(p, replyId = null, isMain = false, parentPost = null) {
            const hasLiked = p.likes.includes(currentUser); const canMod = currentUserRole === 'admin' || currentUserRole === 'mod';
            const canEditContent = canMod || (p.author === currentUser);
            const canEditPostMeta = currentUserRole === 'admin' || currentUserRole === 'editor'; 
            
            let filesHtml = '';
            if (p.fileUrls && p.fileUrls.length > 0) {
                filesHtml = '<div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">';
                p.fileUrls.forEach(url => {
                    const ext = url.split('.').pop().toLowerCase();
                    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) { filesHtml += `<img src="${url}" style="max-width:100%; max-height:300px; border-radius:8px; margin:5px; display:inline-block;">`; } 
                    else { filesHtml += `<br><a href="${url}" target="_blank" style="display:inline-block; background:#E5E7EB; padding:5px 10px; border-radius:5px; text-decoration:none; color:#374151; margin-top:5px; font-size:13px;">📎 צפה בקובץ מצורף</a>`; }
                });
                filesHtml += '</div>';
            }
            
            const moveBtn = (isMain && canEditPostMeta) ? `<button class="btn-action" onclick="triggerMove(${p.id})">📂 העבר</button>` : '';
            const renameBtn = (isMain && canEditPostMeta) ? `<button class="btn-action" onclick="triggerRename(${p.id}, '${p.title.replace(/'/g,"\\'")}')">✏️ שנה כותרת</button>` : '';
            const lockBtn = (isMain && canMod) ? `<button class="btn-action" onclick="triggerLock(${p.id})">${p.isLocked ? '🔓 שחרר' : '🔒 נעל'}</button>` : '';
            const deleteBtn = (!isMain && currentUserRole === 'admin') ? `<button class="btn-action" style="color:red;" onclick="deleteReply(${parentPost.id}, ${p.id})">🗑️ מחק</button>` : '';
            
            const likesList = p.likes.length > 0 ? 'לייקים מ: \n' + p.likes.join('\n') : 'תהיה הראשון לעשות לייק!';
            
            const splitCheckbox = (!isMain && canMod) ? `<input type="checkbox" class="split-cb ${isSplitMode ? '' : 'hidden'}" value="${p.id}">` : '';

            return `
            <div class="post-container" id="post-${replyId || p.id}" style="position:relative;">
                ${splitCheckbox}
                <div class="user-panel"><strong class="clickable-user" style="font-size: 17px;" onclick="showUserProfile('${p.author}')">${p.author}</strong><br>${getUserBadge(p.author)}</div>
                <div class="content-panel">
                    ${isMain ? `<h2 style="margin: 0 0 10px 0; color: var(--text);">${p.isLocked ? '🔒 ' : ''}${p.title}</h2>` : ''}
                    <div style="font-size: 12px; color: #9CA3AF; margin-bottom: 10px;">פורסם: ${p.date} ${isMain ? ` | 👁️ צפיות: ${p.views}` : ''}</div>
                    <div style="font-size: 15px; white-space: pre-wrap; line-height: 1.6;">${parseBBCode(p.content)}</div>
                    ${filesHtml}
                    <div style="margin-top: auto; padding-top: 15px; display: flex; gap: 8px; border-top: 1px solid #e5e7eb; flex-wrap: wrap;">
                        <button class="btn-action ${hasLiked ? 'liked' : ''}" title="${likesList}" onclick="toggleLike(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">👍 נהניתי (${p.likes.length})</button>
                        ${(!parentPost || !parentPost.isLocked) ? `<button class="btn-action" onclick="handleQuote(${parentPost ? parentPost.id : p.id}, ${isMain ? 'null' : p.id})">💬 צטט</button>` : ''}
                        <button class="btn-action" style="color:#b91c1c;" onclick="triggerReport(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">🚨 דווח</button>
                        ${canEditContent ? `<button class="btn-action" style="color:#b45309;" onclick="triggerEdit(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">✏️ עריכת תוכן</button>` : ''}
                        ${renameBtn} ${moveBtn} ${lockBtn} ${deleteBtn}
                    </div>
                </div>
            </div>`;
        }

        async function openThread(id, isRefresh = false) {
            const p = postsData.find(x => x.id === id); if (!p) return backToThreads();
            if (!isRefresh && window.location.search !== `?thread=${id}`) { history.pushState({thread: id}, '', '/?thread=' + id); const res = await fetch(`/api/posts/${id}/view`, {method: 'POST'}); const data = await res.json(); if (data.views) p.views = data.views; }
            readThreads[id] = Date.now(); localStorage.setItem('readThreads', JSON.stringify(readThreads));

            hideAllViews(); document.getElementById('searchContainer').classList.add('hidden');
            document.getElementById('singleThreadView').classList.remove('hidden'); document.getElementById('singleThreadView').setAttribute('data-current-id', id);
            
            if (currentUserRole === 'admin' || currentUserRole === 'mod') { document.getElementById('splitModeBtn').classList.remove('hidden'); }

            if (p.isLocked) html += `<div style="background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 20px; text-align: center; font-weight: bold; border-radius: 8px; margin-top: 25px;">🔒 אשכול זה נעול.</div>`;

                        <button id="replySubmitBtn" onclick="addReply(${p.id})">שלח תגובה</button>
                    </div>
                </div>`;
            document.getElementById('threadContentArea').innerHTML = html;
        }

        async function addReply(postId) {
            if(isSubmitting) return;
            const content = document.getElementById('replyContent').value, fileInput = document.getElementById('replyFile');
            if (!content) return showMsg('שגיאה', 'לא ניתן לשלוח ריק');

        }

        async function deleteReply(postId, replyId) { if(confirm('למחוק תגובה זו לצמיתות?')) { await fetch('/api/posts/delete-reply', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, replyId}) }); loadPosts(); } }
        async function toggleLike(postId, replyId) { const res = await fetch('/api/like', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, replyId}) }); const data = await res.json(); if(data.error) showMsg('שגיאה', data.error); else await initForum(); }
        async function triggerLock(postId) { await fetch('/api/posts/lock', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId}) }); loadPosts(); }
        
        function triggerMove(postId) {
            const selectOptions = Array.from(document.getElementById('categorySelect').options).filter(o => o.value).map(o => `<option value="${o.value}">${o.text.replace('📁 ', '')}</option>`).join('');
            document.getElementById('sysModalTitle').innerText = 'העברת אשכול'; document.getElementById('sysModalText').innerHTML = `<select id="moveCatSelect" style="width:100%;">${selectOptions}</select>`; document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitMove(${postId}, document.getElementById('moveCatSelect').value);" style="background:#10B981; margin-left:10px;">העבר</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden');
        }
        window.submitMove = async function(postId, newCategory) { await fetch('/api/posts/move', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, newCategory}) }); showMsg('בוצע', 'הועבר!'); loadPosts(); }

        function triggerRename(postId, oldTitle) { showInputMsg(`שנה כותרת מ- "${oldTitle}":`, 'submitRename'); window.submitRenamePostId = postId; }
        window.submitRename = async function(newTitle) { 
            if(!newTitle) return; 
            await fetch('/api/posts/rename', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId: window.submitRenamePostId, newTitle}) }); 
            await loadPosts();
            if (!document.getElementById('singleThreadView').classList.contains('hidden')) { openThread(window.submitRenamePostId, true); }
        }

        let currentActionPostId, currentActionReplyId;
        function triggerReport(postId, replyId) { currentActionPostId = postId; currentActionReplyId = replyId; showInputMsg("מה סיבת הדיווח?", 'submitReport'); }
        window.submitReport = async function(reason) { if (!reason) return; await fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reporter: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, reason}) }); showMsg("נשלח", "הדיווח נשלח!"); }

        function triggerContactUs() { showInputMsg("במה נוכל לעזור? הפנייה תגיע לצוות הניהול:", 'submitContactUs'); }
        window.submitContactUs = async function(text) { if(!text) return; await fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reporter: currentUser, postId: null, replyId: null, reason: "פניית צור קשר: " + text}) }); showMsg("נשלח", "פנייתך התקבלה."); }

        function triggerEdit(postId, replyId) { 
            currentActionPostId = postId; currentActionReplyId = replyId; 
            const p = postsData.find(x => x.id === postId); const target = replyId ? p.replies.find(r => r.id === replyId) : p;
            const currentContent = target.content.replace(/\[נערך לאחרונה.*\]/g, '').trim();
            document.getElementById('sysModalTitle').innerText = 'עריכה'; document.getElementById('sysModalText').innerHTML = `<textarea id="modalInput" rows="5" style="width:100%;"></textarea>`; document.getElementById('modalInput').value = currentContent;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitEdit(document.getElementById('modalInput').value);" style="background:#10B981; margin-left:10px;">שמור</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden'); 
        }
        window.submitEdit = async function(newContent) { if (!newContent) return; await fetch('/api/posts/edit', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, newContent}) }); loadPosts(); }
    </script>
</body>
</html>
