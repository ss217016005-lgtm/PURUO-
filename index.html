<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פורום פרומרקייט</title>
    <style>
        :root{--primary:#4F46E5;--secondary:#EC4899;--bg:#F3F4F6;--box-bg:#FFFFFF;--text:#1F2937;--border:#E5E7EB}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);margin:0;color:var(--text)}
        .header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;padding:25px;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
        .header h1{margin:0;font-size:32px;font-weight:800;text-shadow:1px 1px 2px rgba(0,0,0,0.2)}
        .layout{display:flex;max-width:1200px;margin:20px auto;gap:20px;padding:0 15px}
        .main-content{flex:3;background:var(--box-bg);padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05)}
        .sidebar{flex:1;background:var(--box-bg);padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05);height:fit-content}
        .hidden{display:none !important}
        input[type="text"],input[type="password"],textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;transition:0.3s}
        button{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.2s}
        button:hover{transform:translateY(-1px);box-shadow:0 4px 6px rgba(79,70,229,0.3)}
        .btn-action{background:#f3f4f6;color:#4b5563;border:1px solid #d1d5db;font-size:13px;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-block;margin-left:5px}
        .btn-action.liked{background:#fbcfe8;color:#be185d;border-color:#f9a8d4}
        .thread-card{border:1px solid var(--border);padding:15px;border-radius:10px;margin-bottom:15px;background:#ffffff;cursor:pointer;transition:0.2s;display:flex;flex-direction:column}
        .thread-card:hover{transform:translateX(-3px);box-shadow:0 4px 10px rgba(0,0,0,0.05)}
        .thread-title{font-size:20px;font-weight:bold;color:var(--primary);margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .cat-tag{padding:3px 8px;border-radius:6px;color:white;font-size:12px;font-weight:bold}
        .post-container{display:flex;background:#f9fafb;border:1px solid var(--border);border-radius:10px;margin-bottom:15px;overflow:hidden}
        .user-panel{background:#f3f4f6;padding:15px;width:160px;text-align:center;border-left:1px solid var(--border)}
        .content-panel{padding:15px;flex:1;display:flex;flex-direction:column}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:bold;margin-bottom:5px;color:white}
        .badge-admin{background:#EF4444} .badge-mod{background:#F59E0B} .badge-top{background:#fbbf24;color:black} .badge-vet{background:#8B5CF6} .badge-user{background:#6B7280}
        .quote-box{background:#e0f2fe;border-right:4px solid #0284c7;padding:12px;margin:10px 0;border-radius:8px 0 0 8px;color:#0c4a6e;font-style:italic;position:relative}
        .quote-box::before{content:"❝";font-size:24px;position:absolute;left:10px;top:5px;color:#7dd3fc;opacity:0.5}
        .spoiler{border:1px solid #ccc;border-radius:5px;background:#fff;margin:10px 0;overflow:hidden}
        .spoiler summary{background:#e5e7eb;padding:10px;cursor:pointer;font-weight:bold;color:#374151}
        .spoiler-content{padding:15px;border-top:1px solid #ccc;background:#f9fafb}
        .tagged-user{color:#4F46E5;font-weight:bold;background:#e0e7ff;padding:0 4px;border-radius:4px;cursor:pointer}
        .unread-badge{color:red;font-size:12px;font-weight:bold;background:#fee2e2;padding:2px 6px;border-radius:4px}
        .clickable-user{cursor:pointer;color:var(--primary);text-decoration:underline;text-decoration-color:transparent;transition:0.2s}
        .clickable-user:hover{text-decoration-color:var(--primary)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999}
        .modal-box{background:white;padding:25px;border-radius:12px;text-align:center;max-width:500px;width:90%;box-shadow:0 10px 25px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto}
        .icon-btn{cursor:pointer;font-size:20px;position:relative;margin-left:15px;background:none;border:none;padding:0;color:#1F2937}
        .icon-btn .notif-count{position:absolute;top:-8px;right:-10px;background:#EF4444;color:white;font-size:11px;padding:2px 6px;border-radius:50%;font-weight:bold}
        .chat-bubble{padding:8px;border-radius:8px;margin-bottom:8px;max-width:80%;clear:both;}
        
        /* עיצוב החלונות הקופצים בצד */
        #toastContainer { position: fixed; bottom: 20px; left: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--primary); color: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; cursor: pointer; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div id="sysModal" class="modal-overlay hidden"><div class="modal-box"><h2 id="sysModalTitle" style="margin-top:0; color: var(--primary);">הודעה</h2><div id="sysModalText" style="font-size:16px; margin-bottom: 25px; text-align:right;"></div><div id="sysModalBtns"></div></div></div>

    <div class="header"><h1>✨ פורום פרומרקייט ✨</h1></div>

    <div id="authSection" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color: var(--primary);">התחברות לפורום</h2>
        <input type="text" id="username" placeholder="שם משתמש"><input type="password" id="password" placeholder="סיסמה">
        <label style="display: block; margin: 10px 0; font-size: 14px; cursor: pointer;"><input type="checkbox" id="rememberMe" style="width: auto;"> תזכור אותי</label>
        <div style="display: flex; gap: 10px; margin-top: 15px;"><button onclick="login()" style="flex: 1;">התחבר</button><button onclick="register()" style="flex: 1; background: var(--secondary);">הרשמה</button></div>
    </div>

    <div id="forumSection" class="layout hidden">
        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <h2 id="welcomeMsg" style="margin: 0; color: var(--primary);"></h2>
                    <button class="icon-btn" onclick="showNotifications()" title="התראות">🔔 <span id="notifBadge" class="notif-count hidden">0</span></button>
                    <button class="icon-btn" onclick="openInbox()" title="הודעות פרטיות">✉️ <span id="msgBadge" class="notif-count hidden">0</span></button>
                </div>
                <div><button id="adminBtn" class="hidden" onclick="window.location.href='/admin.html'" style="background: #10B981; margin-left: 10px;">ניהול</button><button onclick="logout()" style="background: #EF4444;">התנתק</button></div>
            </div>

            <div id="userProfileView" class="hidden">
                <button onclick="closeProfileAndReturn()" style="background: #6B7280; margin-bottom: 20px;">➔ חזור</button>
                <div id="profileContentArea" style="background: #f9fafb; padding: 20px; border-radius: 10px; border: 1px solid var(--border);"></div>
            </div>

            <div id="threadsView">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
                    <select id="categorySelect" onchange="renderThreads()" style="flex: 2; margin: 0; font-weight: bold;"></select>
                    <button onclick="renderCategoryView()" style="background:#f59e0b; padding: 10px 15px;">🗂️ לפי נושאים</button>
                    <button onclick="toggleNewThreadForm()" style="flex: 1; background: var(--secondary);">+ פתח אשכול</button>
                </div>

                <div id="newThreadForm" class="hidden" style="background: #fdf2f8; border: 1px solid #fbcfe8; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <input type="text" id="newThreadTitle" placeholder="כותרת האשכול">
                    <textarea id="newThreadContent" rows="4" placeholder="תוכן ההודעה..."></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <input type="file" id="newThreadFile" multiple style="width: auto; background: white; border: 1px solid #ccc; border-radius: 4px; padding: 5px;">
                            <button type="button" class="btn-action" style="background:#fff;" onclick="insertTag('newThreadContent', '[spoiler]', '[/spoiler]')">👁️ הוסף ספוילר</button>
                        </div>
                        <button onclick="createThread()">פרסם אשכול</button>
                    </div>
                </div>
                <div id="threadsList"></div>
            </div>

            <div id="singleThreadView" class="hidden">
                <button onclick="backToThreads()" style="background: #6B7280; margin-bottom: 20px;">➔ חזור לרשימת הנושאים</button>
                <div id="threadContentArea"></div>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">סטטוס</h3>
            <p style="font-weight: bold; margin-bottom: 5px;">🟢 מחוברים כעת (<span id="onlineCount">0</span>):</p>
            <ul id="onlineUsersList" style="list-style: none; padding: 0; margin: 0; font-size: 14px;"></ul>
            <button onclick="triggerContactUs()" style="width:100%; background:#8b5cf6; margin-top:20px;">📞 צור קשר עם ההנהלה</button>
        </div>
    </div>

    <script>
        let currentUser = null, currentUserRole = null, postsData = [], usersInfo = {}, confirmActionCb = null;
        let readThreads = JSON.parse(localStorage.getItem('readThreads')) || {};
        window.currentConvos = {}; 
        
        let lastUnreadCount = 0;
        let lastUnreadMsgs = 0;

        const catColors = { "תמונות והסרטות": "#3b82f6", "עזרה הדדית": "#10b981", "בית המדרש": "#8b5cf6", "הלכה למעשה": "#d946ef", "כתבי רבותינו": "#f59e0b", "קורות דורות": "#06b6d4", "אקטואליה": "#ef4444", "הפורום שלנו": "#f97316", "חדשות בציבור": "#64748b" };
        function getCatColor(cat) { return catColors[cat] || "#6B7280"; }
        function timeAgo(ms) { if (!ms) return 'לא ידוע'; const s = Math.floor((Date.now()-ms)/1000); if (s<60) return 'מחובר כעת 🟢'; const m = Math.floor(s/60); if (m<60) return `לפני ${m} דקות`; const h = Math.floor(m/60); if (h<24) return `לפני ${h} שעות`; return `לפני ${Math.floor(h/24)} ימים`; }
        function showMsg(t, txt, hm=true) { document.getElementById('sysModalTitle').innerText = t; document.getElementById('sysModalText').innerHTML = hm ? txt : `<div style="white-space:pre-wrap;">${txt}</div>`; document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal()">סגור</button>`; document.getElementById('sysModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('sysModal').classList.add('hidden'); }
        function showConfirm(txt, cb) { confirmActionCb = cb; document.getElementById('sysModalTitle').innerText='אישור'; document.getElementById('sysModalText').innerText=txt; document.getElementById('sysModalBtns').innerHTML=`<button onclick="closeModal(); confirmActionCb();" style="background:#EF4444; margin-left:10px;">כן</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden'); }
        
        // --- מערכת ההתראות הקופצות (קול + חלון + דפדפן) ---
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }
        
        function triggerPopupAlert(msg) {
            playBeep();
            
            // יצירת חלון קופץ באתר
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerText = msg;
            toast.onclick = () => toast.remove();
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);

            // יצירת התראת דפדפן (אם המשתמש אישר)
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("פורום פרומרקייט", { body: msg });
            }
        }

        window.insertTag = function(id, oTag, cTag) { const el=document.getElementById(id); const s=el.selectionStart, e=el.selectionEnd, txt=el.value; el.value = txt.substring(0,s)+oTag+txt.substring(s,e)+cTag+txt.substring(e,txt.length); el.focus(); el.selectionStart=s+oTag.length; el.selectionEnd=e+oTag.length; };
        
        function parseBBCode(txt) { 
            let html = txt.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi, '<details class="spoiler"><summary>👁️ ספוילר (לחץ להצגה)</summary><div class="spoiler-content">$1</div></details>');
            if (Object.keys(usersInfo).length > 0) { Object.keys(usersInfo).forEach(u => { if(u) { const regex = new RegExp('@' + u.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'); html = html.replace(regex, `<span class="tagged-user" onclick="showUserProfile('${u}'); event.stopPropagation();">@${u}</span>`); } }); }
            let prevHtml; do { prevHtml = html; html = html.replace(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi, '<div class="quote-box"><strong>מאת $1:</strong><br>$2</div>'); } while (html !== prevHtml); return html;
        }

        window.addEventListener('popstate', () => { const params = new URLSearchParams(window.location.search); if (params.get('thread')) openThread(parseInt(params.get('thread')), true); else { document.getElementById('singleThreadView').setAttribute('data-current-id', ''); document.getElementById('userProfileView').classList.add('hidden'); renderThreads(); }});
        window.onload = () => { const savedUser = localStorage.getItem('forumUser') || sessionStorage.getItem('forumUser'); if (savedUser) { currentUser = savedUser; enterForum(); } };

        async function authCall(url, u, p) { if (!u||!p) return showMsg('שגיאה', 'מלא הכל', false); const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) }); return await res.json(); }
        async function register() { const data = await authCall('/api/register', document.getElementById('username').value, document.getElementById('password').value); if(data.message) showMsg('הרשמה', data.message); else showMsg('שגיאה', data.error); }
        async function login() { const data = await authCall('/api/login', document.getElementById('username').value, document.getElementById('password').value); if (data.message) { currentUser = data.username; const rem = document.getElementById('rememberMe').checked; (rem?localStorage:sessionStorage).setItem('forumUser', currentUser); enterForum(); } else showMsg('שגיאה', data.error); }

        async function enterForum() {
            document.getElementById('authSection').classList.add('hidden'); document.getElementById('forumSection').classList.remove('hidden'); document.getElementById('welcomeMsg').innerText = `שלום, ${currentUser}`; 
            
            // בקשת אישור לדפדפן בשביל התראות קופצות
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            
            await initForum(); if(usersInfo[currentUser] && usersInfo[currentUser].role === 'admin') document.getElementById('adminBtn').classList.remove('hidden'); 
        }
        
        function logout() { localStorage.removeItem('forumUser'); sessionStorage.removeItem('forumUser'); location.href = '/'; }

        async function initForum() {
            usersInfo = await (await fetch('/api/users/info')).json(); currentUserRole = usersInfo[currentUser] ? usersInfo[currentUser].role : 'user';
            const cats = await (await fetch('/api/categories')).json(); 
            const isVet = usersInfo[currentUser] && (usersInfo[currentUser].isVeteran || currentUserRole === 'admin' || currentUserRole === 'mod');
            let catHtml = '<option value="">🌐 כל הקטגוריות</option>';
            cats.forEach(c => { if(c==='אקטואליה' && !isVet) return; catHtml += `<option value="${c}">📁 ${c}</option>`; });
            document.getElementById('categorySelect').innerHTML = catHtml;
            loadPosts(); updatePing(); setInterval(updatePing, 30000);
        }

        async function updatePing() {
            if (!currentUser) return;
            const res = await fetch('/api/ping', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });
            const data = await res.json(); document.getElementById('onlineCount').innerText = data.onlineUsers.length;
            document.getElementById('onlineUsersList').innerHTML = data.onlineUsers.map(u => `<li style="padding: 5px 0; border-bottom: 1px solid #eee; cursor:pointer;" onclick="showUserProfile('${u}')">🟢 <span class="clickable-user">${u}</span></li>`).join('');
            
            const nBadge = document.getElementById('notifBadge'); 
            if (data.unreadCount > 0) { 
                nBadge.innerText = data.unreadCount; nBadge.classList.remove('hidden'); 
                if (data.unreadCount > lastUnreadCount) triggerPopupAlert("🔔 התראה חדשה בפורום!");
            } else nBadge.classList.add('hidden');
            lastUnreadCount = data.unreadCount;
            
            const mBadge = document.getElementById('msgBadge'); 
            if (data.unreadMessages > 0) { 
                mBadge.innerText = data.unreadMessages; mBadge.classList.remove('hidden'); 
                if (data.unreadMessages > lastUnreadMsgs) triggerPopupAlert("✉️ הודעה פרטית חדשה!");
            } else mBadge.classList.add('hidden');
            lastUnreadMsgs = data.unreadMessages;
        }

        window.showUserProfile = function(username) {
            document.getElementById('threadsView').classList.add('hidden'); document.getElementById('singleThreadView').classList.add('hidden'); document.getElementById('userProfileView').classList.remove('hidden');
            const info = usersInfo[username]; if (!info) return;
            let userPostsHtml = "<h4>פעילות בפורום:</h4>"; let found = 0;
            postsData.forEach(p => {
                if (p.author === username) { found++; userPostsHtml += `<div style="background:white; border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:5px; cursor:pointer;" onclick="openThread(${p.id})"><strong>אשכול:</strong> <span style="color:var(--primary);">${p.title}</span> <span style="font-size:11px; color:#888;">(${p.date})</span></div>`; }
                p.replies.forEach(r => { if (r.author === username) { found++; userPostsHtml += `<div style="background:white; border:1px solid #ddd; padding:10px; margin-bottom:5px; border-radius:5px; cursor:pointer;" onclick="openThread(${p.id})"><strong>הגיב באשכול:</strong> <span style="color:var(--primary);">${p.title}</span> <span style="font-size:11px; color:#888;">(${r.date})</span></div>`; }});
            });
            if (found === 0) userPostsHtml += "<p>טרם כתב הודעות.</p>";
            let roleStr = info.role === 'admin' ? "👑 מנהל ראשי" : (info.role === 'mod' ? "🛡️ מפקח" : (info.totalLikes >= 50 ? "🏆 משתמש מוביל" : (info.isVeteran ? "🌟 משתמש ותיק" : "👤 משתמש רגיל")));
            document.getElementById('profileContentArea').innerHTML = `<h2 style="color:var(--primary); margin-top:0;">פרופיל משתמש: ${username}</h2><div style="font-size:16px; line-height:1.8; margin-bottom: 20px;"><strong>סטטוס:</strong> ${roleStr}<br><strong>הצטרף:</strong> ${info.joinDate}<br><strong>נראה לאחרונה בפורום:</strong> ${timeAgo(info.lastSeen)}<br><strong>לייקים שקיבל:</strong> ❤️ ${info.totalLikes}<br>${currentUser !== username ? `<button class="btn-action" style="margin-top:10px; background:var(--primary); color:white;" onclick="openNewChat('${username}')">✉️ שלח הודעה פרטית</button>` : ''}</div>${userPostsHtml}`;
        };
        window.closeProfileAndReturn = function() { document.getElementById('userProfileView').classList.add('hidden'); renderThreads(); };

        async function openInbox() {
            const res = await fetch(`/api/messages/${currentUser}`); const msgs = await res.json(); document.getElementById('msgBadge').classList.add('hidden'); 
            window.currentConvos = {}; msgs.forEach(m => { const p = m.from === currentUser ? m.to : m.from; if (!currentConvos[p]) currentConvos[p]=[]; currentConvos[p].push(m); });
            let html = `<div style="display:flex; gap:15px; height:350px;"><div style="flex:1; border-left:1px solid #ddd; padding-left:10px; overflow-y:auto;"><strong>אנשי קשר:</strong><br><br>`;
            for (let p in currentConvos) html += `<button class="btn-action" style="width:100%; margin-bottom:8px; padding:10px;" onclick="openChat('${p}')">💬 ${p}</button>`;
            if (Object.keys(currentConvos).length===0) html += "<p>אין שיחות פתוחות.</p>";
            html += `</div><div id="chatArea" style="flex:2; display:flex; flex-direction:column; background:#f9fafb; border-radius:8px; padding:10px;"><div style="flex:1; display:flex; align-items:center; justify-content:center; color:#aaa;">בחר שיחה מהרשימה</div></div></div>`; showMsg('הודעות פרטיות', html);
        }
        window.openChat = function(partner) {
            let html = `<div id="chatScroll" style="flex:1; overflow-y:auto; padding-right:10px; display:flex; flex-direction:column;">`;
            const chatMsgs = window.currentConvos[partner].sort((a,b) => a.id - b.id);
            chatMsgs.forEach(m => {
                const isMe = m.from === currentUser;
                html += `<div class="chat-bubble" style="background:${isMe?'#e0e7ff':'#fff'}; border:1px solid ${isMe?'#c7d2fe':'#e5e7eb'}; align-self:${isMe?'flex-end':'flex-start'};"><strong style="font-size:12px; color:gray;">${m.from}</strong><br>${m.content.replace(/\n/g, '<br>')}<div style="font-size:10px; color:#aaa; margin-top:4px;">${m.date}</div></div>`;
            });
            html += `</div><div style="margin-top:10px; display:flex; gap:5px; border-top:1px solid #ddd; padding-top:10px;"><textarea id="pmReplyContent" rows="2" style="flex:1;" placeholder="השב ל-${partner}..."></textarea><button onclick="sendPMReply('${partner}')">שלח</button></div>`;
            document.getElementById('chatArea').innerHTML = html; const scroll = document.getElementById('chatScroll'); scroll.scrollTop = scroll.scrollHeight;
        }
        window.openNewChat = function(toUser) {
            if (!usersInfo[currentUser].isVeteran && currentUserRole !== 'admin' && currentUserRole !== 'mod') return showMsg('שגיאה', 'רק משתמשים ותיקים יכולים ליזום שיחות.');
            openInbox().then(() => { if (window.currentConvos[toUser]) openChat(toUser); else { window.currentConvos[toUser]=[]; openChat(toUser); }});
        }
        window.sendPMReply = async function(toUser) {
            const content = document.getElementById('pmReplyContent').value; if(!content) return;
            await fetch('/api/messages', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({from: currentUser, to: toUser, content}) });
            await openInbox(); openChat(toUser);
        }

        window.gotoThread = async function(threadId) { closeModal(); await loadPosts(); openThread(threadId, true); };
        async function showNotifications() {
            const res = await fetch('/api/notifications/clear', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });
            const data = await res.json(); document.getElementById('notifBadge').classList.add('hidden'); lastUnreadCount = 0;
            if (data.notifications.length === 0) showMsg('התראות', 'אין חדש.'); else {
                let html = '<ul style="text-align:right; list-style:none; padding:0;">';
                data.notifications.forEach(n => { html += n.threadId ? `<li style="background:#f3f4f6; padding:10px; margin-bottom:5px; border-radius:5px; cursor:pointer;" onclick="gotoThread(${n.threadId})">🔔 ${n.text}</li>` : `<li style="background:#f3f4f6; padding:10px; margin-bottom:5px; border-radius:5px;">🔔 ${n.text || n}</li>`; });
                showMsg('התראות', html + '</ul>');
            }
        }

        async function loadPosts() {
            postsData = await (await fetch('/api/posts')).json(); 
            const urlThreadId = parseInt(new URLSearchParams(window.location.search).get('thread'));
            if (urlThreadId && postsData.find(p => p.id === urlThreadId)) openThread(urlThreadId, true);
            else if (!document.getElementById('userProfileView').classList.contains('hidden')) {} 
            else { const currentOpenId = parseInt(document.getElementById('singleThreadView').getAttribute('data-current-id')); if(currentOpenId) openThread(currentOpenId, true); else renderThreads(); }
        }

        function generateThreadCard(p) {
            const isUnread = p.lastUpdated > (readThreads[p.id] || 0);
            return `
            <div class="thread-card ${p.isLocked ? 'thread-locked' : ''}" onclick="openThread(${p.id})">
                <div class="thread-title">${p.isLocked ? '🔒 ' : ''}<span class="cat-tag" style="background:${getCatColor(p.category)};">${p.category}</span>${p.title} ${isUnread ? '<span class="unread-badge">חדש</span>' : ''}</div>
                <div style="font-size: 13px; color: #6B7280; display: flex; justify-content: space-between; margin-top:5px;">
                    <span>מאת: <strong class="clickable-user" onclick="showUserProfile('${p.author}'); event.stopPropagation();">${p.author}</strong></span>
                    <span>👁️ צפיות: ${p.views} | 💬 תגובות: ${p.replies.length}</span>
                </div>
            </div>`;
        }

        function renderThreads() {
            document.getElementById('threadsView').classList.remove('hidden'); document.getElementById('singleThreadView').classList.add('hidden'); document.getElementById('userProfileView').classList.add('hidden');
            const cat = document.getElementById('categorySelect').value; 
            let filtered = postsData;
            
            const isVet = usersInfo[currentUser] && (usersInfo[currentUser].isVeteran || currentUserRole === 'admin' || currentUserRole === 'mod');
            if (!isVet) filtered = filtered.filter(p => p.category !== 'אקטואליה');
            if (cat) filtered = filtered.filter(p => p.category === cat);
            
            document.getElementById('threadsList').innerHTML = filtered.map(generateThreadCard).join('');
        }

        function renderCategoryView() {
            document.getElementById('threadsView').classList.remove('hidden'); document.getElementById('singleThreadView').classList.add('hidden'); document.getElementById('userProfileView').classList.add('hidden');
            let html = ''; const cats = Array.from(document.getElementById('categorySelect').options).map(o => o.value).filter(v => v);
            cats.forEach(c => { const catPosts = postsData.filter(p => p.category === c); if(catPosts.length > 0) { html += `<h3 style="margin-top:20px; border-bottom:2px solid ${getCatColor(c)}; color:${getCatColor(c)}; padding-bottom:5px;">📁 ${c}</h3>` + catPosts.map(generateThreadCard).join(''); }});
            document.getElementById('threadsList').innerHTML = html;
        }

        function toggleNewThreadForm() { document.getElementById('newThreadForm').classList.toggle('hidden'); }

        async function createThread() {
            const title = document.getElementById('newThreadTitle').value, content = document.getElementById('newThreadContent').value, cat = document.getElementById('categorySelect').value, fileInput = document.getElementById('newThreadFile');
            if (!title || !content || !cat) return showMsg('שגיאה', 'חובה למלא הכל.');
            const fd = new FormData(); fd.append('author', currentUser); fd.append('title', title); fd.append('content', content); fd.append('category', cat);
            if (fileInput.files) { for(let i=0; i<fileInput.files.length; i++) fd.append('attachedFiles', fileInput.files[i]); }
            await fetch('/api/posts', { method: 'POST', body: fd }); toggleNewThreadForm(); document.getElementById('newThreadTitle').value = ''; document.getElementById('newThreadContent').value = ''; fileInput.value = ''; history.pushState({}, '', '/'); loadPosts();
        }

        function getUserBadge(username) {
            const info = usersInfo[username] || { role: 'user', joinDate: '', totalLikes: 0, isVeteran: false, lastSeen: Date.now() };
            let roleHtml = info.role === 'admin' ? `<span class="badge badge-admin">👑 מנהל ראשי</span>` : (info.role === 'mod' ? `<span class="badge badge-mod">🛡️ צוות פיקוח</span>` : (info.totalLikes >= 50 ? `<span class="badge badge-top">🏆 משתמש מוביל</span>` : (info.isVeteran ? `<span class="badge badge-vet">🌟 משתמש ותיק</span>` : `<span class="badge badge-user">משתמש רגיל</span>`)));
            return `${roleHtml}<br><span style="font-size:10px; color:#9CA3AF; display:block; margin-top:3px;">נראה לאחרונה: ${timeAgo(info.lastSeen)}</span><span style="font-size:11px; color:#6B7280; display:block; margin-top:2px;">הצטרף: ${info.joinDate}</span><span style="font-size:11px; color:#EC4899; font-weight:bold; display:block;">❤️ לייקים: ${info.totalLikes}</span>`;
        }

        window.insertQuote = function(author, content) { document.getElementById('replyContent').value += `[quote="${author}"]\n${content}\n[/quote]\n\n`; document.getElementById('replyContent').focus(); };

        function renderPostBlock(p, replyId = null, isMain = false, parentPost = null) {
            const hasLiked = p.likes.includes(currentUser); const canMod = currentUserRole === 'admin' || currentUserRole === 'mod';
            const canEdit = canMod || (p.author === currentUser);
            
            let filesHtml = '';
            if (p.fileUrls && p.fileUrls.length > 0) {
                filesHtml = '<div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">';
                p.fileUrls.forEach(url => {
                    const ext = url.split('.').pop().toLowerCase();
                    if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) { filesHtml += `<img src="${url}" style="max-width:100%; max-height:300px; border-radius:8px; margin:5px; display:inline-block;">`; } 
                    else { filesHtml += `<br><a href="${url}" target="_blank" style="display:inline-block; background:#E5E7EB; padding:5px 10px; border-radius:5px; text-decoration:none; color:#374151; margin-top:5px; font-size:13px;">📎 צפה בקובץ מצורף</a>`; }
                });
                filesHtml += '</div>';
            }
            
            const moveBtn = (isMain && currentUserRole === 'admin') ? `<button class="btn-action" onclick="triggerMove(${p.id})">📂 העבר</button>` : '';
            const lockBtn = (isMain && canMod) ? `<button class="btn-action" onclick="triggerLock(${p.id})">${p.isLocked ? '🔓 שחרר' : '🔒 נעל'}</button>` : '';
            const deleteBtn = (!isMain && currentUserRole === 'admin') ? `<button class="btn-action" style="color:red;" onclick="deleteReply(${parentPost.id}, ${p.id})">🗑️ מחק תגובה</button>` : '';
            
            const likesList = p.likes.length > 0 ? 'לייקים מ: ' + p.likes.join(', ') : 'תהיה הראשון לעשות לייק!';

            return `
            <div class="post-container" id="post-${replyId || p.id}">
                <div class="user-panel"><strong class="clickable-user" style="font-size: 17px;" onclick="showUserProfile('${p.author}')">${p.author}</strong><br>${getUserBadge(p.author)}</div>
                <div class="content-panel">
                    ${isMain ? `<h2 style="margin: 0 0 10px 0; color: var(--text);">${p.isLocked ? '🔒 ' : ''}${p.title}</h2>` : ''}
                    <div style="font-size: 12px; color: #9CA3AF; margin-bottom: 10px;">פורסם: ${p.date} ${isMain ? ` | 👁️ צפיות: ${p.views}` : ''}</div>
                    <div style="font-size: 15px; white-space: pre-wrap; line-height: 1.6;">${parseBBCode(p.content)}</div>
                    ${filesHtml}
                    <div style="margin-top: auto; padding-top: 15px; display: flex; gap: 8px; border-top: 1px solid #e5e7eb; flex-wrap: wrap;">
                        <button class="btn-action ${hasLiked ? 'liked' : ''}" title="${likesList}" onclick="toggleLike(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">👍 נהניתי (${p.likes.length})</button>
                        ${(!parentPost || !parentPost.isLocked) ? `<button class="btn-action" onclick="insertQuote('${p.author}', \`${p.content.replace(/`/g, "'")}\`)">💬 צטט</button>` : ''}
                        <button class="btn-action" style="color:#b91c1c;" onclick="triggerReport(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">🚨 דווח</button>
                        ${canEdit ? `<button class="btn-action" style="color:#b45309;" onclick="triggerEdit(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">✏️ עריכה</button>` : ''}
                        ${moveBtn} ${lockBtn} ${deleteBtn}
                    </div>
                </div>
            </div>`;
        }

        async function openThread(id, isRefresh = false) {
            const p = postsData.find(x => x.id === id); if (!p) return backToThreads();
            if (!isRefresh && window.location.search !== `?thread=${id}`) { history.pushState({thread: id}, '', '/?thread=' + id); const res = await fetch(`/api/posts/${id}/view`, {method: 'POST'}); const data = await res.json(); if (data.views) p.views = data.views; }
            readThreads[id] = Date.now(); localStorage.setItem('readThreads', JSON.stringify(readThreads));

            document.getElementById('threadsView').classList.add('hidden'); document.getElementById('userProfileView').classList.add('hidden');
            document.getElementById('singleThreadView').classList.remove('hidden'); document.getElementById('singleThreadView').setAttribute('data-current-id', id);
            
            const isFollowing = p.followers.includes(currentUser);
            let html = `<div style="display:flex; justify-content:flex-end; margin-bottom:15px;"><button onclick="toggleFollow(${p.id})" style="background: ${isFollowing ? '#6B7280' : '#10B981'};">${isFollowing ? '🔕 בטל מעקב' : '🔔 עקוב'}</button></div>`;
            html += renderPostBlock(p, null, true, p) + `<h3 style="margin-top: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">💬 תגובות (${p.replies.length}):</h3><div id="repliesList" style="margin-top:15px;">${p.replies.map(r => renderPostBlock(r, r.id, false, p)).join('')}</div>`;
            
            if (p.isLocked) html += `<div style="background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 20px; text-align: center; font-weight: bold; border-radius: 8px; margin-top: 25px;">🔒 אשכול זה נעול.</div>`;
            else html += `<div style="border-top: 2px dashed var(--border); margin-top: 25px; padding-top: 20px;"><h4 style="margin-top:0;">הוסף תגובה:</h4><textarea id="replyContent" rows="4" placeholder="תגובתך (לתיוג הקלד @ ושם)"></textarea><div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; flex-wrap: wrap; gap: 10px;"><div><input type="file" id="replyFile" multiple style="background: white; border: 1px solid #ccc; padding: 5px;"><button type="button" class="btn-action" onclick="insertTag('replyContent', '[spoiler]', '[/spoiler]')">👁️ ספוילר</button></div><button onclick="addReply(${p.id})">שלח תגובה</button></div></div>`;
            document.getElementById('threadContentArea').innerHTML = html;
        }

        function backToThreads() { history.pushState({}, '', '/'); document.getElementById('singleThreadView').setAttribute('data-current-id', ''); document.getElementById('userProfileView').classList.add('hidden'); renderThreads(); }
        async function toggleFollow(postId) { await fetch(`/api/posts/${postId}/follow`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) }); loadPosts(); }

        async function addReply(postId) {
            const content = document.getElementById('replyContent').value, fileInput = document.getElementById('replyFile');
            if (!content) return showMsg('שגיאה', 'לא ניתן לשלוח ריק');
            const fd = new FormData(); fd.append('author', currentUser); fd.append('content', content);
            if (fileInput && fileInput.files) { for(let i=0; i<fileInput.files.length; i++) fd.append('attachedFiles', fileInput.files[i]); }
            const res = await fetch(`/api/posts/${postId}/reply`, { method: 'POST', body: fd }); const data = await res.json();
            if(data.error) showMsg('שגיאה', data.error); else loadPosts();
        }

        async function deleteReply(postId, replyId) { if(confirm('למחוק תגובה זו לצמיתות?')) { await fetch('/api/posts/delete-reply', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, replyId}) }); loadPosts(); } }
        async function toggleLike(postId, replyId) { const res = await fetch('/api/like', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, replyId}) }); const data = await res.json(); if(data.error) showMsg('שגיאה', data.error); else await initForum(); }
        async function triggerLock(postId) { await fetch('/api/posts/lock', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId}) }); loadPosts(); }
        
        function triggerMove(postId) {
            const selectOptions = Array.from(document.getElementById('categorySelect').options).filter(o => o.value).map(o => `<option value="${o.value}">${o.text.replace('📁 ', '')}</option>`).join('');
            document.getElementById('sysModalTitle').innerText = 'העברת אשכול'; document.getElementById('sysModalText').innerHTML = `<select id="moveCatSelect" style="width:100%;">${selectOptions}</select>`; document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitMove(${postId}, document.getElementById('moveCatSelect').value);" style="background:#10B981; margin-left:10px;">העבר</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; document.getElementById('sysModal').classList.remove('hidden');
        }
        async function submitMove(postId, newCategory) { await fetch('/api/posts/move', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, newCategory}) }); showMsg('בוצע', 'הועבר!'); loadPosts(); }

        let currentActionPostId, currentActionReplyId;
        function triggerReport(postId, replyId) { currentActionPostId = postId; currentActionReplyId = replyId; showInputMsg("מה סיבת הדיווח?", submitReport); }
        async function submitReport(reason) { if (!reason) return; await fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reporter: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, reason}) }); showMsg("נשלח", "הדיווח נשלח!"); }

        function triggerContactUs() { showInputMsg("במה נוכל לעזור? הפנייה תגיע לצוות הניהול:", async (text) => { if(!text) return; await fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reporter: currentUser, postId: null, replyId: null, reason: "פניית צור קשר: " + text}) }); showMsg("נשלח", "פנייתך התקבלה."); }); }

        function triggerEdit(postId, replyId) { 
            currentActionPostId = postId; currentActionReplyId = replyId; 
            const p = postsData.find(x => x.id === postId);
            const target = replyId ? p.replies.find(r => r.id === replyId) : p;
            const currentContent = target.content.replace(/\[נערך לאחרונה.*\]/g, '').trim();
            document.getElementById('sysModalTitle').innerText = 'עריכה'; 
            document.getElementById('sysModalText').innerHTML = `<textarea id="modalInput" rows="5" style="width:100%;"></textarea>`; 
            document.getElementById('modalInput').value = currentContent;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitEdit(document.getElementById('modalInput').value);" style="background:#10B981; margin-left:10px;">שמור</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`; 
            document.getElementById('sysModal').classList.remove('hidden'); 
        }
        async function submitEdit(newContent) { if (!newContent) return; await fetch('/api/posts/edit', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, newContent}) }); loadPosts(); }
    </script>
</body>
</html>
