<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פורום פרומרקייט</title>
    <style>
        :root{--primary:#4F46E5;--secondary:#EC4899;--bg:#F3F4F6;--box-bg:#FFFFFF;--text:#1F2937;--border:#E5E7EB; --hover-bg: #f9fafb;}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);margin:0;color:var(--text)}
        .header{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;padding:25px;text-align:center;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
        .header h1{margin:0;font-size:32px;font-weight:800;text-shadow:1px 1px 2px rgba(0,0,0,0.2)}
        .layout{display:flex;max-width:1200px;margin:20px auto;gap:20px;padding:0 15px}
        .main-content{flex:3;background:var(--box-bg);padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05)}
        .sidebar{flex:1;background:var(--box-bg);padding:20px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.05);height:fit-content}
        .hidden{display:none !important}
        input[type="text"],input[type="password"],input[type="email"],textarea,select{width:100%;padding:12px;margin:8px 0;border:1px solid var(--border);border-radius:8px;box-sizing:border-box;transition:0.3s}
        button{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.2s}
        button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 6px rgba(79,70,229,0.3)}
        button:disabled{opacity:0.6;cursor:not-allowed}
        .btn-action{background:#f3f4f6;color:#4b5563;border:1px solid #d1d5db;font-size:13px;padding:6px 10px;border-radius:6px;cursor:pointer;display:inline-block;margin-left:5px}
        .btn-action.liked{background:#fbcfe8;color:#be185d;border-color:#f9a8d4}
        
        .thread-list-container { border: 1px solid var(--border); border-radius: 8px; background: white; overflow: hidden; }
        .thread-card { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding: 15px; cursor: pointer; transition: 0.2s; background: white; }
        .thread-card:last-child { border-bottom: none; }
        .thread-card:hover { background: var(--hover-bg); }
        .thread-locked { background: #fafafa; opacity: 0.8; }
        
        .thread-main-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .thread-avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 1px solid #ddd; }
        .thread-text-info { display: flex; flex-direction: column; gap: 5px; }
        .thread-title { font-size: 18px; font-weight: bold; color: var(--primary); display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:0;}
        .thread-meta { font-size: 12px; color: #6B7280; }
        
        .thread-stats { display: flex; gap: 20px; align-items: center; text-align: center; color: #6B7280; font-size: 12px; min-width: 120px; justify-content: flex-end; padding-left: 15px; border-left: 1px solid #eee; }
        .thread-last-reply { text-align: right; font-size: 12px; color: #6B7280; min-width: 150px; display: flex; flex-direction: column; gap: 3px; }
        .thread-last-reply .user-name { font-weight: bold; color: var(--text); }
        
        .cat-tag{padding:3px 8px;border-radius:6px;color:white;font-size:11px;font-weight:bold; letter-spacing: 0.5px;}
        
        .post-container{display:flex;background:#f9fafb;border:1px solid var(--border);border-radius:10px;margin-bottom:15px;overflow:hidden; scroll-margin-top: 20px;}
        .user-panel{background:#f3f4f6;padding:15px;width:160px;text-align:center;border-left:1px solid var(--border)}
        .content-panel{padding:15px;flex:1;display:flex;flex-direction:column; position: relative;}
        .badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:12px;font-weight:bold;margin-bottom:5px;color:white}
        .badge-admin{background:#EF4444} .badge-mod{background:#F59E0B} .badge-editor{background:#0d9488} .badge-top{background:#fbbf24;color:black} .badge-vet{background:#8B5CF6} .badge-user{background:#6B7280}
        .quote-box{background:#e0f2fe;border-right:4px solid #0284c7;padding:12px;margin:5px 0;border-radius:8px 0 0 8px;color:#0c4a6e;font-style:italic;position:relative}
        .quote-box::before{content:"❝";font-size:24px;position:absolute;left:10px;top:5px;color:#7dd3fc;opacity:0.5}
        .spoiler{border:1px solid #ccc;border-radius:5px;background:#fff;margin:10px 0;overflow:hidden}
        .spoiler summary{background:#e5e7eb;padding:10px;cursor:pointer;font-weight:bold;color:#374151}
        .spoiler-content{padding:15px;border-top:1px solid #ccc;background:#f9fafb}
        .tagged-user{color:#4F46E5;font-weight:bold;background:#e0e7ff;padding:0 4px;border-radius:4px;cursor:pointer}
        .unread-badge{color:red;font-size:11px;font-weight:bold;background:#fee2e2;padding:2px 6px;border-radius:4px}
        .clickable-user{cursor:pointer;color:var(--primary);text-decoration:underline;text-decoration-color:transparent;transition:0.2s}
        .clickable-user:hover{text-decoration-color:var(--primary)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(2px)}
        .modal-box{background:white;padding:25px;border-radius:12px;text-align:center;max-width:600px;width:90%;box-shadow:0 10px 25px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto; transition: 0.3s;}
        .modal-box-large { max-width: 1000px !important; width: 95%; height: 85vh; display:flex; flex-direction:column; }
        .icon-btn{cursor:pointer;font-size:20px;position:relative;margin-left:15px;background:none;border:none;padding:0;color:#1F2937}
        .icon-btn .notif-count{position:absolute;top:-8px;right:-10px;background:#EF4444;color:white;font-size:11px;padding:2px 6px;border-radius:50%;font-weight:bold}
        .chat-bubble{padding:10px;border-radius:12px;margin-bottom:10px;max-width:85%;clear:both;position:relative}
        .pm-thanks{font-size:10px;background:#fbcfe8;color:#be185d;padding:2px 5px;border-radius:10px;position:absolute;bottom:-8px;left:10px;border:1px solid white;cursor:pointer}
        #toastContainer{position:fixed;bottom:20px;left:20px;z-index:10000;display:flex;flex-direction:column;gap:10px}
        .toast{background:var(--primary);color:white;padding:15px 20px;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.3);animation:slideIn 0.3s ease-out;cursor:pointer}
        @keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .rich-toolbar{display:flex;gap:5px;background:#e5e7eb;padding:5px;border-radius:5px 5px 0 0;border:1px solid var(--border);border-bottom:none; flex-wrap:wrap;}
        .rich-toolbar button{background:white;color:black;padding:5px 10px;font-size:12px;border:1px solid #ccc;border-radius:4px;cursor:pointer}
        .rich-toolbar button:hover{background:#f3f4f6}
        .search-bar{display:flex;gap:10px;background:#f9fafb;padding:15px;border-radius:8px;margin-bottom:20px;border:1px solid var(--border); flex-wrap:wrap;}
        .rules-box {background:#e0e7ff; padding:15px; border-radius:8px; border:1px solid #c7d2fe; margin-top:15px; text-align:right;}
        .split-cb { position: absolute; right: 15px; top: 15px; transform: scale(1.8); cursor: pointer; z-index: 50; }
        .poll-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin: 15px 0; }
        .poll-option { display:flex; justify-content:space-between; background:white; padding:8px 15px; margin-bottom:8px; border-radius:4px; border:1px solid #ddd; cursor:pointer; }
        .poll-option:hover { background:#e2e8f0; }
        .poll-bar { background: #10b981; height: 5px; border-radius: 3px; margin-top: 5px; transition: width 0.5s; }
        .user-avatar-large { width:60px; height:60px; border-radius:50%; object-fit:cover; margin-bottom:5px; border:2px solid var(--border); }
        .user-signature { border-top:1px dashed #ccc; padding-top:10px; margin-top:15px; font-size:13px; color:#6b7280; font-style:italic; }
    </style>
</head>
<body>

    <div id="toastContainer"></div>
    <div id="sysModal" class="modal-overlay hidden"><div class="modal-box" id="sysModalBox"><h2 id="sysModalTitle" style="margin-top:0; color: var(--primary);">הודעה</h2><div id="sysModalText" style="font-size:16px; margin-bottom: 25px; text-align:right;"></div><div id="sysModalBtns"></div></div></div>

    <div class="header"><h1>✨ פורום פרומרקייט ✨</h1></div>

    <div id="authSection" style="max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color: var(--primary);">התחברות לפורום</h2>
        <input type="text" id="username" placeholder="שם משתמש">
        <input type="password" id="password" placeholder="סיסמה">
        <label style="display: block; margin: 10px 0; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="rememberMe" style="width: auto;"> תזכור אותי
        </label>
        
        <div class="rules-box">
            <label style="font-size: 14px; cursor: pointer; display:flex; align-items:center; gap:8px; font-weight:bold; color:#3730a3;">
                <input type="checkbox" id="agreeRules" style="width: 18px; height: 18px;"> 
                <span>אני מאשר/ת שקראתי והבנתי את <a href="#" onclick="showRules(); return false;" style="color:var(--primary); text-decoration:underline;">כללי הפורום</a>.</span>
            </label>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="loginBtn" onclick="login()" style="flex: 1;">התחבר</button>
            <button id="regBtn" onclick="register()" style="flex: 1; background: var(--secondary);">הרשמה כמשתמש חדש</button>
        </div>
    </div>

    <div id="forumSection" class="layout hidden">
        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <h2 id="welcomeMsg" style="margin: 0; color: var(--primary);"></h2>
                    <button class="icon-btn" onclick="showNotifications()" title="התראות">🔔 <span id="notifBadge" class="notif-count hidden">0</span></button>
                    <button class="icon-btn" onclick="openInbox()" title="הודעות פרטיות">✉️ <span id="msgBadge" class="notif-count hidden">0</span></button>
                </div>
                <div>
                    <button onclick="openProfileSettings()" style="background: #3b82f6;">⚙️ פרופיל אישי</button>
                    <button id="adminBtn" class="hidden" onclick="window.location.href='/admin.html'" style="background: #10B981; margin-left: 5px;">ניהול</button>
                    <button onclick="logout()" style="background: #EF4444; margin-left: 5px;">התנתק</button>
                </div>
            </div>

            <div class="search-bar" id="searchContainer">
                <input type="text" id="searchInput" placeholder="חפש בפורום..." style="flex:2; margin:0;">
                <select id="searchType" style="flex:1; margin:0;"><option value="all">חיפוש כללי</option><option value="user">חיפוש לפי כותב</option><option value="category">חיפוש בקטגוריה נוכחית</option></select>
                <button onclick="executeSearch()" style="background:var(--primary);">🔍 חפש</button>
                <button onclick="clearSearch()" style="background:#6B7280;">✖️ נקה</button>
            </div>

            <div id="profileSettingsView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--primary); margin:0;">⚙️ הגדרות פרופיל אישי</h2>
                    <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לפורום</button>
                </div>
                <div style="background:#f9fafb; padding:20px; border-radius:10px; border:1px solid var(--border);">
                    <label><strong>כתובת אימייל:</strong></label>
                    <input type="email" id="profEmail" placeholder="you@example.com">
                    
                    <label><strong>תמונת פרופיל (העלה קובץ, ימתין לאישור מנהל):</strong></label>
                    <input type="file" id="profAvatarFile" accept="image/*" style="background:white;">
                    
                    <label><strong>חתימה אישית (תוצג בתחתית ההודעות שלך):</strong></label>
                    <input type="text" id="profSignature" placeholder="משפט חזק או ציטוט אהוב...">
                    <hr style="margin:20px 0;">
                    <label><strong>שינוי סיסמה (השאר ריק אם לא תרצה לשנות):</strong></label>
                    <input type="password" id="profOldPass" placeholder="סיסמה נוכחית">
                    <input type="password" id="profNewPass" placeholder="סיסמה חדשה">
                    <button onclick="saveProfile()" style="margin-top:15px;">💾 שמור שינויים</button>
                </div>
            </div>

            <div id="userProfileView" class="hidden">
                <button onclick="backToThreads()" style="background: #6B7280; margin-bottom: 20px;">➔ חזור</button>
                <div id="profileContentArea" style="background: #f9fafb; padding: 20px; border-radius: 10px; border: 1px solid var(--border);"></div>
            </div>

            <div id="allFilesView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--primary); margin:0;">📁 כל הקבצים בפורום</h2>
                    <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לפורום</button>
                </div>
                <div id="allFilesContainer" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:15px;"></div>
            </div>

            <div id="linkArchiveView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color:var(--primary); margin:0;">🗃️ מאגר קישורים</h2>
                    <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לפורום</button>
                </div>
                <div style="background:#fdf2f8; padding:15px; border-radius:8px; border:1px solid #fbcfe8; margin-bottom:20px;">
                    <h4 style="margin-top:0;">הוסף קישור חדש למאגר:</h4>
                    <input type="text" id="newLinkTitle" placeholder="כותרת / תיאור הקישור (למשל: אתר למאגר תמונות חינמי)">
                    <input type="text" id="newLinkUrl" placeholder="כתובת הקישור (כולל https://)">
                    <button onclick="addLinkToArchive()" style="margin-top:10px;">💾 שמור במאגר</button>
                </div>
                <div id="linksContainer" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
            </div>

            <div id="threadsView">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap:wrap;">
                    <select id="categorySelect" onchange="renderThreads()" style="flex: 2; margin: 0; font-weight: bold; min-width:200px;"></select>
                    <button onclick="toggleArchiveView()" id="archiveToggleBtn" style="background:#8b5cf6; padding: 10px 15px;">📉 אשכולות פחות רלוונטיים</button>
                    <button onclick="markAllAsRead()" style="background:#6B7280; padding: 10px 15px;">✔️ סמן הכל כנקרא</button>
                    <button onclick="toggleNewThreadForm()" style="flex: 1; background: var(--secondary); min-width:150px;">+ פתח אשכול</button>
                </div>

                <div id="newThreadForm" class="hidden" style="background: #fdf2f8; border: 1px solid #fbcfe8; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <input type="text" id="newThreadTitle" placeholder="כותרת האשכול">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <select id="newThreadTag" style="flex:1;"><option value="">ללא תגית</option></select>
                        <label style="flex:1; display:flex; align-items:center; cursor:pointer;"><input type="checkbox" id="addPollCb" onchange="document.getElementById('pollArea').classList.toggle('hidden')"> 📊 הוסף סקר</label>
                    </div>
                    <div id="pollArea" class="hidden" style="background:white; padding:15px; border-radius:8px; border:1px solid #ddd; margin-bottom:10px;">
                        <input type="text" id="pollQuestion" placeholder="שאלת הסקר (למשל: מה דעתכם על...?)">
                        <input type="text" id="pollOptions" placeholder="אפשרויות להצבעה (הפרד בפסיקים, למשל: כן, לא, אולי)">
                    </div>
                    <div class="rich-toolbar">
                        <button type="button" onclick="insertTag('newThreadContent', '[b]', '[/b]')"><b>B</b></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[i]', '[/i]')"><i>I</i></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[u]', '[/u]')"><u>U</u></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[color=red]', '[/color]')"><span style="color:red">A</span></button>
                        <button type="button" onclick="insertTag('newThreadContent', '[size=20]', '[/size]')">T</button>
                        <button type="button" onclick="insertTag('newThreadContent', '[spoiler]', '[/spoiler]')">👁️</button>
                        <button type="button" onclick="promptForLink('newThreadContent')">🔗 קישור</button>
                        <button type="button" onclick="previewText('newThreadContent')" style="background:#0ea5e9; color:white; border-color:#0284c7;">👁️ תצוגה מקדימה</button>
                    </div>
                    <textarea id="newThreadContent" rows="4" placeholder="תוכן ההודעה..." style="border-top:none; border-radius:0 0 8px 8px; margin-top:0;"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <input type="file" id="newThreadFile" multiple style="width: auto; background: white; border: 1px solid #ccc; border-radius: 4px; padding: 5px;">
                        <button id="postThreadBtn" onclick="createThread()">פרסם אשכול</button>
                    </div>
                </div>
                
                <h3 id="archiveHeader" class="hidden" style="color:#8b5cf6; border-bottom:2px solid #8b5cf6; padding-bottom:5px;">📉 אשכולות פחות רלוונטיים (תגובה תחזיר אותם לפורום הראשי)</h3>
                <div id="threadsList" class="thread-list-container"></div>
            </div>

            <div id="singleThreadView" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                    <div style="display:flex; gap:10px;">
                        <button onclick="backToThreads()" style="background: #6B7280;">➔ חזור לרשימת הנושאים</button>
                        <button id="splitModeBtn" class="hidden" onclick="toggleSplitMode()" style="background: #0ea5e9;">✂️ מצב פיצול אשכול</button>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="threadSearchInput" placeholder="חפש באשכול..." style="margin:0; padding:8px; width:200px;">
                        <button onclick="searchInThread()">🔍 חפש</button>
                    </div>
                </div>
                <div id="splitActionArea" class="hidden" style="background:#e0f2fe; padding:15px; border-radius:8px; border:1px solid #bae6fd; margin-bottom:20px; display:flex; gap:10px; align-items:center;">
                    <strong style="color:#0284c7;">פיצול מסומנים לאשכול חדש:</strong>
                    <input type="text" id="splitNewTitle" placeholder="כותרת האשכול החדש" style="margin:0; flex:1;">
                    <button onclick="executeSplit()" style="background:#0284c7;">בצע פיצול</button>
                </div>
                <div id="threadContentArea"></div>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">סטטוס הקהילה</h3>
            <button onclick="showMembersList()" style="width:100%; background:#3b82f6; margin-bottom:10px;">👥 חברי הקהילה (<span id="totalUsersCounter">0</span>)</button>
            <button onclick="openLinkArchive()" style="width:100%; background:#0ea5e9; margin-bottom:10px;">🗃️ מאגר קישורים</button>
            <button onclick="openAllFiles()" style="width:100%; background:#8b5cf6; margin-bottom:15px;">📁 כל הקבצים בפורום</button>
            <button onclick="showRules()" style="width:100%; background:#10b981; margin-bottom:15px;">📜 חוקי הפורום</button>
            <p style="font-weight: bold; margin-bottom: 5px;">🟢 מחוברים כעת (<span id="onlineCount">0</span>):</p>
            <ul id="onlineUsersList" style="list-style: none; padding: 0; margin: 0; font-size: 14px;"></ul>
            <button onclick="triggerContactUs()" style="width:100%; background:#d946ef; margin-top:20px;">📞 צור קשר עם ההנהלה</button>
        </div>
    </div>

    <script>
        let currentUser = null, currentUserRole = null, postsData = [], usersInfo = {}, tagsData = [], confirmActionCb = null;
        let readThreads = JSON.parse(localStorage.getItem('readThreads')) || {};
        window.currentConvos = {}; let currentChatPartner = null; let currentChatSubject = null;
        let lastUnreadCount = 0, lastUnreadMsgs = 0;
        let isSubmitting = false;
        let isSplitMode = false;
        let viewingArchived = false;

        const catColors = { "תמונות והסרטות": "#3b82f6", "עזרה הדדית": "#10b981", "בית המדרש": "#8b5cf6", "הלכה למעשה": "#d946ef", "כתבי רבותינו": "#f59e0b", "קורות דורות": "#06b6d4", "אקטואליה": "#ef4444", "הפורום שלנו": "#f97316", "חדשות בציבור": "#64748b" };
        function getCatColor(cat) { return catColors[cat] || "#6B7280"; }

        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3); } catch(e) {} }
        function triggerPopupAlert(msg) { playBeep(); const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg; toast.onclick = () => toast.remove(); document.getElementById('toastContainer').appendChild(toast); setTimeout(() => toast.remove(), 4000); if ("Notification" in window && Notification.permission === "granted") new Notification("פורום פרומרקייט", { body: msg }); }

        window.insertTag = function(id, oTag, cTag) { const el=document.getElementById(id); const s=el.selectionStart, e=el.selectionEnd, txt=el.value; el.value = txt.substring(0,s)+oTag+txt.substring(s,e)+cTag+txt.substring(e,txt.length); el.focus(); el.selectionStart=s+oTag.length; el.selectionEnd=e+oTag.length; };
        
        window.promptForLink = function(textareaId) {

            if (url) {
                const text = prompt("איזו מילה תרצה שתופיע כקישור? (השאר ריק כדי להציג את הכתובת עצמה)");
                const linkText = text ? text : url;
                insertTag(textareaId, `[url=${url}]`, `${linkText}[/url]`);
            }
        };

            } catch (e) {

            }

        function parseBBCode(txt) { 
            let html = txt.replace(/\[b\]([\s\S]*?)\[\/b\]/gi, '<strong>$1</strong>');
            html = html.replace(/\[i\]([\s\S]*?)\[\/i\]/gi, '<em>$1</em>');
            html = html.replace(/\[u\]([\s\S]*?)\[\/u\]/gi, '<u>$1</u>');
            html = html.replace(/\[color=(.*?)\]([\s\S]*?)\[\/color\]/gi, '<span style="color:$1">$2</span>');
            html = html.replace(/\[size=(.*?)\]([\s\S]*?)\[\/size\]/gi, '<span style="font-size:$1px">$2</span>');
            html = html.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi, '<details class="spoiler"><summary>👁️ ספוילר (לחץ להצגה)</summary><div class="spoiler-content">$1</div></details>');
            html = html.replace(/\[url=(.*?)\]([\s\S]*?)\[\/url\]/gi, '<a href="$1" target="_blank" style="color:var(--primary); text-decoration:underline; font-weight:bold; word-break:break-all;">$2</a>');
            html = html.replace(/\[edit\]([\s\S]*?)\[\/edit\]/gi, '<div style="text-align:left; font-size:11px; color:#9ca3af; margin-top:5px; border-top:1px dashed #eee; padding-top:5px;">$1</div>');
            
            if (Object.keys(usersInfo).length > 0) { Object.keys(usersInfo).forEach(u => { if(u) { const regex = new RegExp('@' + u.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'); html = html.replace(regex, `<span class="tagged-user" onclick="showUserProfile('${u}'); event.stopPropagation();">@${u}</span>`); } }); }
            let prevHtml; do { prevHtml = html; html = html.replace(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi, '<div class="quote-box"><strong>מאת $1:</strong><br>$2</div>'); } while (html !== prevHtml); return html;
        }
