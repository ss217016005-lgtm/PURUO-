<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פורום פרומרקייט</title>
    <style>
        :root { --primary: #4F46E5; --secondary: #EC4899; --bg: #F3F4F6; --box-bg: #FFFFFF; --text: #1F2937; --border: #E5E7EB; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 32px; font-weight: 800; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .layout { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        
        .main-content { flex: 3; background: var(--box-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .sidebar { flex: 1; background: var(--box-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        
        .hidden { display: none !important; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        button { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3); }
        
        .btn-action { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; font-size: 13px; padding: 6px 10px; border-radius: 6px; cursor: pointer; display: inline-block; margin-left: 5px; }
        .btn-action.liked { background: #fbcfe8; color: #be185d; border-color: #f9a8d4; }
        
        .thread-card { border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #ffffff; cursor: pointer; transition: 0.2s; border-right: 4px solid var(--primary); display: flex; flex-direction: column;}
        .thread-card:hover { border-color: var(--primary); transform: translateX(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .thread-title { font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .thread-locked { border-right-color: #6B7280; opacity: 0.8; }
        
        .post-container { display: flex; background: #f9fafb; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .user-panel { background: #f3f4f6; padding: 15px; width: 160px; text-align: center; border-left: 1px solid var(--border); }
        .content-panel { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: white; }
        .badge-admin { background: #EF4444; } .badge-mod { background: #F59E0B; } .badge-vet { background: #8B5CF6; } .badge-user { background: #6B7280; }
        
        .quote-box { background: #e0f2fe; border-right: 4px solid #0284c7; padding: 12px; margin: 10px 0; border-radius: 8px 0 0 8px; color: #0c4a6e; font-style: italic; position: relative; }
        .quote-box::before { content: "❝"; font-size: 24px; position: absolute; left: 10px; top: 5px; color: #7dd3fc; opacity: 0.5; }
        
        .spoiler { border: 1px solid #ccc; border-radius: 5px; background: #fff; margin: 10px 0; overflow: hidden; }
        .spoiler summary { background: #e5e7eb; padding: 10px; cursor: pointer; font-weight: bold; color: #374151; }
        .spoiler-content { padding: 15px; border-top: 1px solid #ccc; background: #f9fafb; }
        
        /* עיצוב לתיוג משתמש */
        .tagged-user { color: #4F46E5; font-weight: bold; background: #e0e7ff; padding: 0 4px; border-radius: 4px; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px; border-radius: 12px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto;}
        
        .icon-btn { cursor: pointer; font-size: 20px; position: relative; margin-left: 15px; background: none; border: none; padding: 0; color: #1F2937; }
        .icon-btn .notif-count { position: absolute; top: -8px; right: -10px; background: #EF4444; color: white; font-size: 11px; padding: 2px 6px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sysModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="sysModalTitle" style="margin-top:0; color: var(--primary);">הודעת מערכת</h2>
            <div id="sysModalText" style="font-size:16px; margin-bottom: 25px; text-align:right;"></div>
            <div id="sysModalBtns"></div>
        </div>
    </div>

    <div class="header">
        <h1>✨ פורום פרומרקייט ✨</h1>
        <p style="margin: 5px 0 0 0; font-size: 16px; opacity: 0.9;">הקהילה המקצועית והאיכותית ברשת</p>
    </div>

    <div id="authSection" style="max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="text-align:center; color: var(--primary);">התחברות לקהילה</h2>
        <input type="text" id="username" placeholder="שם משתמש">
        <input type="password" id="password" placeholder="סיסמה">
        <label style="display: block; margin: 10px 0; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="rememberMe" style="width: auto;"> תזכור אותי במחשב זה
        </label>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="login()" style="flex: 1;">התחבר</button>
            <button onclick="register()" style="flex: 1; background: var(--secondary);">הרשמה</button>
        </div>
    </div>

    <div id="forumSection" class="layout hidden">
        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <h2 id="welcomeMsg" style="margin: 0; color: var(--primary);"></h2>
                    <button class="icon-btn" onclick="showNotifications()" title="התראות">🔔 <span id="notifBadge" class="notif-count hidden">0</span></button>
                    <button class="icon-btn" onclick="openInbox()" title="הודעות פרטיות">✉️ <span id="msgBadge" class="notif-count hidden">0</span></button>
                </div>
                <div>
                    <button id="adminBtn" class="hidden" onclick="window.location.href='/admin.html'" style="background: #10B981; margin-left: 10px;">ניהול מערכת</button>
                    <button onclick="logout()" style="background: #EF4444;">התנתק</button>
                </div>
            </div>

            <div id="threadsView">
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
                    <select id="categorySelect" onchange="renderThreads()" style="flex: 2; margin: 0; font-weight: bold;"></select>
                    <button onclick="toggleNewThreadForm()" style="flex: 1; background: var(--secondary);">+ פתח אשכול חדש</button>
                </div>

                <div id="newThreadForm" class="hidden" style="background: #fdf2f8; border: 1px solid #fbcfe8; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                    <input type="text" id="newThreadTitle" placeholder="כותרת האשכול הרשמית">
                    <textarea id="newThreadContent" rows="4" placeholder="תוכן ההודעה... (לתיוג משתמש הקלד @ ושמו)"></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <input type="file" id="newThreadFile" style="width: auto;">
                            <button type="button" class="btn-action" style="background:#fff;" onclick="insertTag('newThreadContent', '[spoiler]', '[/spoiler]')">👁️ הכנס ספוילר</button>
                        </div>
                        <button onclick="createThread()">פרסם אשכול לציבור</button>
                    </div>
                </div>
                <div id="threadsList"></div>
            </div>

            <div id="singleThreadView" class="hidden">
                <button onclick="backToThreads()" style="background: #6B7280; margin-bottom: 20px;">➔ חזור לרשימת הנושאים</button>
                <div id="threadContentArea"></div>
            </div>
        </div>

        <div class="sidebar">
            <h3 style="margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px;">סטטוס קהילה</h3>
            <p style="font-weight: bold; margin-bottom: 5px;">🟢 מחוברים כעת (<span id="onlineCount">0</span>):</p>
            <ul id="onlineUsersList" style="list-style: none; padding: 0; margin: 0; font-size: 14px;"></ul>
        </div>
    </div>

    <script>
        let currentUser = null, currentUserRole = null, postsData = [], usersInfo = {}, confirmActionCb = null;

        function showMsg(title, text, htmlMode = true) {
            document.getElementById('sysModalTitle').innerText = title;
            document.getElementById('sysModalText').innerHTML = htmlMode ? text : `<div style="white-space:pre-wrap;">${text}</div>`;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal()">סגור</button>`;
            document.getElementById('sysModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('sysModal').classList.add('hidden'); }
        function showConfirm(text, cb) {
            confirmActionCb = cb; document.getElementById('sysModalTitle').innerText = 'אישור פעולה';
            document.getElementById('sysModalText').innerText = text;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); confirmActionCb();" style="background:#EF4444; margin-left:10px;">כן, בצע</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`;
            document.getElementById('sysModal').classList.remove('hidden');
        }
        function showInputMsg(text, cb) {
            document.getElementById('sysModalTitle').innerText = 'הזנת נתונים';
            document.getElementById('sysModalText').innerHTML = `${text}<br><br><input type="text" id="modalInput" style="width:100%;">`;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); ${cb.name}(document.getElementById('modalInput').value);" style="background:#10B981; margin-left:10px;">שמור</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`;
            document.getElementById('sysModal').classList.remove('hidden'); setTimeout(() => document.getElementById('modalInput').focus(), 100);
        }

        // פונקציית עזר להכנסת תגיות (כמו ספוילר)
        window.insertTag = function(elementId, openTag, closeTag) {
            const el = document.getElementById(elementId);
            const start = el.selectionStart, end = el.selectionEnd;
            const text = el.value;
            el.value = text.substring(0, start) + openTag + text.substring(start, end) + closeTag + text.substring(end, text.length);
            el.focus();
            el.selectionStart = start + openTag.length;
            el.selectionEnd = end + openTag.length;
        };

        // המרת BBCode (כולל ספוילר, ציטוט, ותיוג)
        function parseBBCode(text) { 
            let html = text.replace(/\[spoiler\]([\s\S]*?)\[\/spoiler\]/gi, '<details class="spoiler"><summary>👁️ ספוילר (לחץ להצגה)</summary><div class="spoiler-content">$1</div></details>');
            html = html.replace(/\[quote="(.*?)"\]([\s\S]*?)\[\/quote\]/gi, '<div class="quote-box"><strong>מאת $1:</strong><br>$2</div>');
            // תיוג משתמש (מודגש)
            html = html.replace(/@([א-תa-zA-Z0-9_]+)/g, '<span class="tagged-user" title="תיוג משתמש">@$1</span>');
            return html;
        }

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const threadId = parseInt(urlParams.get('thread'));
            if (threadId) openThread(threadId, true);
            else { document.getElementById('singleThreadView').setAttribute('data-current-id', ''); renderThreads(); }
        });

        window.onload = () => {
            const savedUser = localStorage.getItem('forumUser') || sessionStorage.getItem('forumUser');
            if (savedUser) { currentUser = savedUser; enterForum(); }
        };

        async function authCall(url, u, p) {
            if (!u || !p) return showMsg('שגיאה', 'אנא מלא את כל השדות', false);
            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            return await res.json();
        }

        async function register() {
            const data = await authCall('/api/register', document.getElementById('username').value, document.getElementById('password').value);
            if(data.message) showMsg('הרשמה', data.message); else showMsg('שגיאה', data.error);
        }

        async function login() {
            const data = await authCall('/api/login', document.getElementById('username').value, document.getElementById('password').value);
            if (data.message) {
                currentUser = data.username;
                const remember = document.getElementById('rememberMe').checked;
                (remember ? localStorage : sessionStorage).setItem('forumUser', currentUser);
                enterForum();
            } else showMsg('שגיאה', data.error);
        }

        async function enterForum() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('forumSection').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `שלום, ${currentUser}`;
            await initForum();
            if(usersInfo[currentUser] && usersInfo[currentUser].role === 'admin') document.getElementById('adminBtn').classList.remove('hidden');
        }

        function logout() { localStorage.clear(); sessionStorage.clear(); location.href = '/'; }

        async function initForum() {
            usersInfo = await (await fetch('/api/users/info')).json();
            currentUserRole = usersInfo[currentUser] ? usersInfo[currentUser].role : 'user';
            const cats = await (await fetch('/api/categories')).json();
            document.getElementById('categorySelect').innerHTML = '<option value="">🌐 הצג את כל הקטגוריות</option>' + cats.map(c => `<option value="${c}">📁 ${c}</option>`).join('');
            loadPosts(); updatePing(); setInterval(updatePing, 30000);
        }

        async function updatePing() {
            if (!currentUser) return;
            const res = await fetch('/api/ping', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });
            const data = await res.json();
            document.getElementById('onlineCount').innerText = data.onlineUsers.length;
            document.getElementById('onlineUsersList').innerHTML = data.onlineUsers.map(u => `<li style="padding: 5px 0; border-bottom: 1px solid #eee;">🟢 ${u}</li>`).join('');
            
            const nBadge = document.getElementById('notifBadge');
            if (data.unreadCount > 0) { nBadge.innerText = data.unreadCount; nBadge.classList.remove('hidden'); } else nBadge.classList.add('hidden');
            
            const mBadge = document.getElementById('msgBadge');
            if (data.unreadMessages > 0) { mBadge.innerText = data.unreadMessages; mBadge.classList.remove('hidden'); } else mBadge.classList.add('hidden');
        }

        async function openInbox() {
            const res = await fetch(`/api/messages/${currentUser}`);
            const msgs = await res.json();
            document.getElementById('msgBadge').classList.add('hidden'); 
            let html = `<div style="max-height: 300px; overflow-y:auto; margin-bottom:15px; background:#f9fafb; padding:10px; border-radius:8px;">`;
            if (msgs.length === 0) html += "<p>אין לך הודעות פרטיות.</p>";
            else { msgs.forEach(m => { html += `<div style="background:white; border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:5px; text-align:right;"><strong style="color:var(--primary);">${m.from}</strong> <span style="font-size:11px; color:#888;">${m.date}</span><div style="margin-top:5px; white-space:pre-wrap;">${m.content}</div></div>`; }); }
            html += `</div>`; showMsg('תיבת הודעות נכנסות', html);
        }

        function triggerSendPM(toUser) {
            const info = usersInfo[currentUser];
            if (!info || !info.isVeteran) return showMsg('שגיאה', 'רק משתמשים ותיקים (עם 10 לייקים) או חברי הנהלה יכולים לשלוח הודעות פרטיות.');
            document.getElementById('sysModalTitle').innerText = `שליחת הודעה פרטית אל: ${toUser}`;
            document.getElementById('sysModalText').innerHTML = `<textarea id="pmContent" rows="4" style="width:100%;" placeholder="כתוב כאן..."></textarea>`;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="sendPM('${toUser}')" style="background:#10B981;">שלח הודעה</button> <button onclick="closeModal()">ביטול</button>`;
            document.getElementById('sysModal').classList.remove('hidden');
        }

        async function sendPM(toUser) {
            const content = document.getElementById('pmContent').value; if(!content) return;
            await fetch('/api/messages', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({from: currentUser, to: toUser, content}) });
            closeModal(); showMsg('הצלחה', 'ההודעה נשלחה לנמען!');
        }

        window.gotoThread = function(threadId) { closeModal(); openThread(threadId, false); };
        async function showNotifications() {
            const res = await fetch('/api/notifications/clear', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) });
            const data = await res.json();
            document.getElementById('notifBadge').classList.add('hidden');
            if (data.notifications.length === 0) showMsg('התראות', 'אין לך התראות חדשות.');
            else {
                let html = '<ul style="text-align:right; list-style:none; padding:0;">';
                data.notifications.forEach(n => {
                    if(n.threadId) html += `<li style="background:#f3f4f6; padding:10px; margin-bottom:5px; border-radius:5px; cursor:pointer;" onclick="gotoThread(${n.threadId})">🔔 ${n.text}</li>`;
                    else html += `<li style="background:#f3f4f6; padding:10px; margin-bottom:5px; border-radius:5px;">🔔 ${n.text || n}</li>`;
                });
                html += '</ul>'; showMsg('התראות', html);
            }
        }

        async function loadPosts() {
            postsData = await (await fetch('/api/posts')).json();
            const urlParams = new URLSearchParams(window.location.search);
            const urlThreadId = parseInt(urlParams.get('thread'));
            if (urlThreadId && postsData.find(p => p.id === urlThreadId)) openThread(urlThreadId, true);
            else {
                const currentOpenId = parseInt(document.getElementById('singleThreadView').getAttribute('data-current-id'));
                if(currentOpenId) openThread(currentOpenId, true); else renderThreads();
            }
        }

        function renderThreads() {
            document.getElementById('threadsView').classList.remove('hidden');
            document.getElementById('singleThreadView').classList.add('hidden');
            const cat = document.getElementById('categorySelect').value;
            let filtered = cat ? postsData.filter(p => p.category === cat) : postsData;
            
            document.getElementById('threadsList').innerHTML = filtered.reverse().map(p => `
                <div class="thread-card ${p.isLocked ? 'thread-locked' : ''}" onclick="openThread(${p.id})">
                    <div class="thread-title">${p.isLocked ? '🔒 ' : ''}${p.title}</div>
                    <div style="font-size: 13px; color: #6B7280; display: flex; justify-content: space-between;">
                        <span>מאת: <strong>${p.author}</strong></span>
                        <span>קטגוריה: ${p.category} | תגובות: ${p.replies.length}</span>
                    </div>
                </div>
            `).join('');
        }

        function toggleNewThreadForm() { document.getElementById('newThreadForm').classList.toggle('hidden'); }

        async function createThread() {
            const title = document.getElementById('newThreadTitle').value, content = document.getElementById('newThreadContent').value, cat = document.getElementById('categorySelect').value;
            if (!title || !content || !cat) return showMsg('שגיאה', 'חובה למלא את כל השדות.');
            const fd = new FormData(); fd.append('author', currentUser); fd.append('title', title); fd.append('content', content); fd.append('category', cat);
            await fetch('/api/posts', { method: 'POST', body: fd });
            toggleNewThreadForm(); document.getElementById('newThreadTitle').value = ''; document.getElementById('newThreadContent').value = '';
            history.pushState({}, '', '/'); loadPosts();
        }

        function getUserBadge(username) {
            const info = usersInfo[username] || { role: 'user', joinDate: '', totalLikes: 0, isVeteran: false };
            let roleHtml = `<span class="badge badge-user">משתמש רגיל</span>`;
            if (info.role === 'admin') roleHtml = `<span class="badge badge-admin">👑 מנהל ראשי</span>`;
            else if (info.role === 'mod') roleHtml = `<span class="badge badge-mod">🛡️ צוות פיקוח</span>`;
            else if (info.isVeteran) roleHtml = `<span class="badge badge-vet">🌟 משתמש ותיק</span>`;
            return `${roleHtml}<br>
                    <span style="font-size:11px; color:#6B7280; display:block; margin-top:5px;">הצטרף ב: ${info.joinDate}</span>
                    <span style="font-size:11px; color:#EC4899; font-weight:bold;">❤️ לייקים: ${info.totalLikes}</span>
                    ${currentUser !== username ? `<br><button class="btn-action" style="margin-top:5px; padding:3px 6px; font-size:10px;" onclick="triggerSendPM('${username}')">✉️ שלח הודעה</button>` : ''}`;
        }

        window.insertQuote = function(author, content) {
            const cleanContent = content.replace(/\[quote=".*?"\][\s\S]*?\[\/quote\]/gi, '');
            document.getElementById('replyContent').value += `[quote="${author}"]\n${cleanContent.trim()}\n[/quote]\n\n`;
            document.getElementById('replyContent').focus();
        };

        function renderPostBlock(p, replyId = null, isMain = false, parentPost = null) {
            const hasLiked = p.likes.includes(currentUser);
            const canMod = currentUserRole === 'admin' || currentUserRole === 'mod';
            const parsedContent = parseBBCode(p.content);
            const moveBtn = (isMain && currentUserRole === 'admin') ? `<button class="btn-action" onclick="triggerMove(${p.id})">📂 העבר</button>` : '';
            const lockBtn = (isMain && canMod) ? `<button class="btn-action" style="color:#4b5563;" onclick="triggerLock(${p.id})">${p.isLocked ? '🔓 שחרר נעילה' : '🔒 נעל אשכול'}</button>` : '';
            
            return `
            <div class="post-container" id="post-${replyId || p.id}">
                <div class="user-panel">
                    <strong style="font-size: 17px; color: var(--primary);">${p.author}</strong><br>
                    ${getUserBadge(p.author)}
                </div>
                <div class="content-panel">
                    ${isMain ? `<h2 style="margin: 0 0 10px 0; color: var(--text);">${p.isLocked ? '🔒 ' : ''}${p.title}</h2>` : ''}
                    <div style="font-size: 12px; color: #9CA3AF; margin-bottom: 10px;">פורסם בתאריך: ${p.date}</div>
                    <div style="font-size: 15px; white-space: pre-wrap; line-height: 1.6;">${parsedContent}</div>
                    ${p.fileUrl ? `<div style="margin-top: 15px;"><a href="${p.fileUrl}" target="_blank" style="background:#E5E7EB; padding:5px 10px; border-radius:5px; text-decoration:none; color:#374151;">📎 קובץ מצורף</a></div>` : ''}
                    
                    <div style="margin-top: auto; padding-top: 15px; display: flex; gap: 8px; border-top: 1px solid #e5e7eb; flex-wrap: wrap;">
                        <button class="btn-action ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">👍 נהניתי (${p.likes.length})</button>
                        ${(!parentPost || !parentPost.isLocked) ? `<button class="btn-action" onclick="insertQuote('${p.author}', \`${p.content.replace(/`/g, "'")}\`)">💬 צטט</button>` : ''}
                        <button class="btn-action" style="color:#b91c1c;" onclick="triggerReport(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">🚨 דווח</button>
                        ${canMod ? `<button class="btn-action" style="color:#b45309;" onclick="triggerEdit(${isMain ? p.id : parentPost.id}, ${isMain ? 'null' : p.id})">✏️ עריכה</button>` : ''}
                        ${moveBtn} ${lockBtn}
                    </div>
                </div>
            </div>`;
        }

        function openThread(id, isRefresh = false) {
            const p = postsData.find(x => x.id === id);
            if (!p) return backToThreads();
            if (!isRefresh && window.location.search !== `?thread=${id}`) history.pushState({thread: id}, '', '/?thread=' + id);

            document.getElementById('threadsView').classList.add('hidden');
            const view = document.getElementById('singleThreadView');
            view.classList.remove('hidden'); view.setAttribute('data-current-id', id);
            
            const isFollowing = p.followers.includes(currentUser);
            
            let html = `<div style="display:flex; justify-content:flex-end; margin-bottom:15px;"><button onclick="toggleFollow(${p.id})" style="background: ${isFollowing ? '#6B7280' : '#10B981'};">${isFollowing ? '🔕 בטל מעקב אחרי נושא זה' : '🔔 קבל התראות על נושא זה'}</button></div>`;
            html += renderPostBlock(p, null, true, p);
            html += `<h3 style="margin-top: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 5px; display:inline-block;">💬 תגובות לאשכול (${p.replies.length}):</h3>`;
            html += `<div id="repliesList" style="margin-top:15px;">${p.replies.map(r => renderPostBlock(r, r.id, false, p)).join('')}</div>`;
            
            if (p.isLocked) {
                html += `<div style="background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c; padding: 20px; text-align: center; font-weight: bold; border-radius: 8px; margin-top: 25px;">🔒 אשכול זה נעול לתגובות על ידי צוות ההנהלה.</div>`;
            } else {
                html += `
                    <div style="border-top: 2px dashed var(--border); margin-top: 25px; padding-top: 20px;">
                        <h4 style="margin-top:0;">הוסף תגובה משלך:</h4>
                        <textarea id="replyContent" rows="4" placeholder="כתוב את תגובתך בכבוד הראוי... (לתיוג הקלד @ ושם)"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                            <button type="button" class="btn-action" style="background:#fff; margin:0;" onclick="insertTag('replyContent', '[spoiler]', '[/spoiler]')">👁️ הכנס ספוילר</button>
                            <button onclick="addReply(${p.id})">שלח תגובה לאשכול</button>
                        </div>
                    </div>
                `;
            }
            document.getElementById('threadContentArea').innerHTML = html;
        }

        function backToThreads() { history.pushState({}, '', '/'); document.getElementById('singleThreadView').setAttribute('data-current-id', ''); renderThreads(); }

        async function toggleFollow(postId) { await fetch(`/api/posts/${postId}/follow`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser}) }); loadPosts(); }

        async function addReply(postId) {
            const content = document.getElementById('replyContent').value;
            if (!content) return showMsg('שגיאה', 'לא ניתן לשלוח תגובה ריקה');
            const fd = new FormData(); fd.append('author', currentUser); fd.append('content', content);
            const res = await fetch(`/api/posts/${postId}/reply`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.error) showMsg('שגיאה', data.error); else loadPosts();
        }

        async function toggleLike(postId, replyId) {
            const res = await fetch('/api/like', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, replyId}) });
            const data = await res.json();
            if(data.error) showMsg('שגיאה', data.error); else await initForum();
        }

        async function triggerLock(postId) {
            await fetch('/api/posts/lock', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId}) });
            loadPosts();
        }

        function triggerMove(postId) {
            const selectHtml = `<select id="moveCatSelect"><option value="תמונות והסרטות">תמונות והסרטות</option><option value="עזרה הדדית">עזרה הדדית</option><option value="למעשה">למעשה</option><option value="הפורום שלנו">הפורום שלנו</option><option value="חדשות בציבור">חדשות בציבור</option></select>`;
            document.getElementById('sysModalTitle').innerText = 'העברת אשכול לקטגוריה אחרת';
            document.getElementById('sysModalText').innerHTML = `בחר קטגוריה חדשה:<br><br>${selectHtml}`;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitMove(${postId}, document.getElementById('moveCatSelect').value);" style="background:#10B981; margin-left:10px;">העבר</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`;
            document.getElementById('sysModal').classList.remove('hidden');
        }
        async function submitMove(postId, newCategory) {
            await fetch('/api/posts/move', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId, newCategory}) });
            showMsg('בוצע', 'האשכול הועבר בהצלחה!'); loadPosts();
        }

        let currentActionPostId, currentActionReplyId;
        function triggerReport(postId, replyId) {
            currentActionPostId = postId; currentActionReplyId = replyId;
            showInputMsg("מה סיבת הדיווח?", submitReport);
        }
        async function submitReport(reason) {
            if (!reason) return;
            await fetch('/api/report', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({reporter: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, reason}) });
            showMsg("נשלח", "תודה. הדיווח נשלח לצוות הפיקוח בהצלחה.");
        }

        function triggerEdit(postId, replyId) {
            currentActionPostId = postId; currentActionReplyId = replyId;
            document.getElementById('sysModalTitle').innerText = 'עריכת הנהלה (הזן תוכן מלא)';
            document.getElementById('sysModalText').innerHTML = `<textarea id="modalInput" rows="5" style="width:100%;"></textarea>`;
            document.getElementById('sysModalBtns').innerHTML = `<button onclick="closeModal(); submitEdit(document.getElementById('modalInput').value);" style="background:#10B981; margin-left:10px;">שמור שינויים</button><button onclick="closeModal()" style="background:#6B7280;">ביטול</button>`;
            document.getElementById('sysModal').classList.remove('hidden'); setTimeout(() => document.getElementById('modalInput').focus(), 100);
        }
        async function submitEdit(newContent) {
            if (!newContent) return;
            await fetch('/api/posts/edit', { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, postId: currentActionPostId, replyId: currentActionReplyId, newContent}) });
            loadPosts();
        }
    </script>
</body>
</html>
