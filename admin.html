<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פאנל ניהול הפורום</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #ecf0f1; color: #333; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #bdc3c7; padding: 12px; text-align: right; }
        th { background: #34495e; color: white; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-approve { background: #27ae60; } .btn-approve:hover { background: #2ecc71; }
        .btn-delete { background: #e74c3c; } .btn-delete:hover { background: #c0392b; }
        .btn-mod { background: #f39c12; } .btn-mod:hover { background: #e67e22; }
        .section { margin-bottom: 40px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .reports-section { border-right: 5px solid #e74c3c; }
        .link-btn { background: #3498db; color: white; text-decoration: none; padding: 8px 12px; border-radius: 4px; display: inline-block; font-size: 14px;}
        .link-btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 15px; margin-bottom: 20px;">
            <h1 style="margin: 0; color: #2c3e50;">⚙️ ניהול המערכת</h1>
            <button onclick="window.location.href='/'" style="background:#7f8c8d; font-size: 16px;">חזור לפורום הראשי</button>
        </div>

        <div class="section reports-section">
            <h2 style="color: #c0392b; margin-top: 0;">🚨 דיווחים שהתקבלו מהמשתמשים</h2>
            <table>
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>מדווח</th>
                        <th>סיבת הדיווח</th>
                        <th>מעבר להודעה</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="reportsTable"></tbody>
            </table>
        </div>

        <div class="section" style="border-right: 5px solid #f39c12;">
            <h2 style="color: #d35400; margin-top: 0;">🔔 משתמשים הממתינים לאישור</h2>
            <ul id="pendingUsersList" style="list-style: none; padding: 0;"></ul>
        </div>

        <div class="section" style="border-right: 5px solid #8e44ad;">
            <h2 style="color: #8e44ad; margin-top: 0;">👥 ניהול משתמשים רשומים</h2>
            <table>
                <thead>
                    <tr>
                        <th>שם משתמש</th>
                        <th>תפקיד</th>
                        <th>תאריך הצטרפות</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="allUsersTable"></tbody>
            </table>
        </div>

        <div class="section" style="border-right: 5px solid #2980b9;">
            <h2 style="color: #2980b9; margin-top: 0;">🗑️ ניהול אשכולות (הודעות ראשיות)</h2>
            <table>
                <thead>
                    <tr>
                        <th>תאריך</th>
                        <th>כותב</th>
                        <th>קטגוריה</th>
                        <th>כותרת</th>
                        <th>פעולה</th>
                    </tr>
                </thead>
                <tbody id="postsTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadReports() {
            const res = await fetch('/api/admin/reports');
            const reports = await res.json();
            const tbody = document.getElementById('reportsTable');
            if (reports.length === 0) { tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; font-weight:bold; color:green;'>אין דיווחים פתוחים. הכל שקט! 😎</td></tr>"; return; }
            tbody.innerHTML = reports.map(r => `<tr><td>${r.date}</td><td><strong>${r.reporter}</strong></td><td style="color: red; font-weight: bold;">${r.reason}</td><td><a class="link-btn" href="/?thread=${r.postId}" target="_blank">🔗 צפה בהודעה המדווחת</a></td><td><button class="btn-approve" onclick="resolveReport(${r.id})">סמן כטופל (מחק)</button></td></tr>`).join('');
        }

        async function resolveReport(id) {
            if (confirm('האם הדיווח נבדק וטופל?')) { await fetch(`/api/admin/reports/${id}`, { method: 'DELETE' }); loadReports(); }
        }

        async function loadPendingUsers() {
            const res = await fetch('/api/admin/pending-users');
            const users = await res.json();
            const list = document.getElementById('pendingUsersList');
            if (users.length === 0) { list.innerHTML = "<li style='color: green; font-weight: bold;'>אין משתמשים שממתינים לאישור.</li>"; return; }
            list.innerHTML = users.map(u => `<li style="background: #f8f9fa; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;"><strong style="font-size: 18px;">${u}</strong> <button class="btn-approve" onclick="approveUser('${u}')">אשר משתמש זה</button></li>`).join('');
        }

        async function approveUser(username) {
            await fetch('/api/admin/approve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username }) });
            loadPendingUsers(); loadAllUsers();
        }

        // --- ניהול משתמשים רשומים ---
        async function loadAllUsers() {
            const res = await fetch('/api/admin/all-users');
            const users = await res.json();
            const tbody = document.getElementById('allUsersTable');
            
            tbody.innerHTML = users.map(u => {
                let roleStr = u.role === 'admin' ? '👑 מנהל' : (u.role === 'mod' ? '🛡️ מפקח' : '👤 משתמש');
                if(!u.isApproved && u.role !== 'admin') roleStr += ' (ממתין לאישור)';
                return `
                <tr>
                    <td><strong>${u.username}</strong></td>
                    <td>${roleStr}</td>
                    <td>${u.joinDate}</td>
                    <td>
                        ${u.role !== 'admin' ? `<button class="btn-delete" onclick="deleteUser('${u.username}')">מחק משתמש</button>` : '<span style="color:gray;">לא ניתן למחוק מנהל</span>'}
                    </td>
                </tr>
                `;
            }).join('');
        }

        async function deleteUser(username) {
            if (confirm(`אזהרה קריטית: האם אתה בטוח שברצונך למחוק לחלוטין את המשתמש "${username}"? לא ניתן לבטל פעולה זו!`)) {
                const res = await fetch(`/api/admin/users/${username}`, { method: 'DELETE' });
                const data = await res.json();
                if(data.error) alert(data.error);
                loadAllUsers();
            }
        }

        // --- ניהול אשכולות ---
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const tbody = document.getElementById('postsTable');
            if (posts.length === 0) { tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>אין אשכולות בפורום עדיין.</td></tr>"; return; }
            tbody.innerHTML = posts.reverse().map(p => `<tr><td>${p.date}</td><td><strong>${p.author}</strong></td><td>${p.category}</td><td title="${p.content}"><a style="color:#2980b9;" href="/?thread=${p.id}" target="_blank">${p.title}</a></td><td><button class="btn-delete" onclick="deletePost(${p.id})">מחק אשכול לצמיתות</button></td></tr>`).join('');
        }

        async function deletePost(id) {
            if (confirm('אזהרה: מחיקת האשכול תמחק גם את כל התגובות שבו! להמשיך?')) { await fetch(`/api/posts/${id}`, { method: 'DELETE' }); loadPosts(); }
        }

        window.onload = () => { loadReports(); loadPendingUsers(); loadAllUsers(); loadPosts(); };
    </script>
</body>
</html>
